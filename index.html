<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>Overlay — Atelier</title>
  <!--
    PAGE UNIQUE (S3) — remplace les Browser Sources HTML séparées.
    #bg-layer : DotGrid permanent (une seule instance, survit aux changements de scène).
    #scene-root : conteneur des scènes (montage/swap/transition par scene-runtime.js).
    Un <template data-scene="id"> par scène de référence porte structure + placement (AD-5).
    OBS : Browser Source 1920×1080, pointer-events: none.
  -->
  <link rel="stylesheet" href="./tokens.css">
  <style>
    /* ── Couches racine ──────────────────────────────────────── */
    #bg-layer,
    #scene-root {
      position: absolute;
      inset: 0;
      width: 1920px;
      height: 1080px;
      pointer-events: none;
    }
    #bg-layer   { z-index: var(--z-bg, 0); }
    #scene-root { z-index: var(--z-content, 10); }

    /* Conteneur de scène — aucun fond opaque (la transparence vient du body, AC-41) */
    .scene {
      position: absolute;
      inset: 0;
      width: 1920px;
      height: 1080px;
    }

    /* ════════════════ DISCUSSION ════════════════ */
    /* .disc-cam retiré (S8) — remplacé par le composant Box (options par défaut), voir
       scenes/discussion.config.js. Position toujours pilotée par Placement (couche `cam`). */
    .scene[data-scene="discussion"] .disc-name { font-size: 74px; letter-spacing: -0.5px; line-height: 1; margin-bottom: 18px; }
    .scene[data-scene="discussion"] .disc-rule-gold { margin-bottom: 20px; }
    .scene[data-scene="discussion"] .disc-label { margin-bottom: 10px; }
    .scene[data-scene="discussion"] .subject-text { font-size: 38px; line-height: 1.2; }
    .scene[data-scene="discussion"] [data-layer="subject"] { height: 184px; padding-bottom: 20px; border-bottom: var(--border-rule); }
    .scene[data-scene="discussion"] [data-layer="stats"] { padding: 20px 0; border-bottom: var(--border-rule); }
    .scene[data-scene="discussion"] [data-layer="chat"] {
      padding-top: 20px; overflow: hidden; display: flex; flex-direction: column;
    }
    .scene[data-scene="discussion"] [data-layer="last-follow"] {
      padding-top: 16px; border-top: 0.3px solid var(--color-gold-dim);
    }
    .scene[data-scene="discussion"] .last-follow-name { font-size: 38px; }

    /* ════════════════ BRB ════════════════ */
    /* Position/taille de .brb-block-left pilotées par Placement (scenes/brb.config.js), voir
       docs/specs/scene-placement-protocol.md. */
    .scene[data-scene="brb"] .brb-block-left {
      display: flex; flex-direction: column;
    }
    .scene[data-scene="brb"] .brb-tag { margin-bottom: 32px; }
    .scene[data-scene="brb"] .brb-name { font-size: 120px; letter-spacing: -2px; line-height: 0.9; margin-bottom: 24px; }
    .scene[data-scene="brb"] .brb-rule-gold { margin-bottom: 32px; }
    .scene[data-scene="brb"] .brb-message { font-size: 38px; line-height: 1.4; margin-bottom: 8px; }
    .scene[data-scene="brb"] .brb-activity { font-size: 38px; line-height: 1.4; }
    .scene[data-scene="brb"] .brb-song-label { margin-bottom: 10px; }
    .scene[data-scene="brb"] .brb-song { font-size: 22px; }
    .scene[data-scene="brb"] .brb-separator {
      position: absolute; top: 40px; left: 1140px; width: 1px; height: 940px; background: var(--color-rule);
    }
    /* Position/taille de .brb-block-right pilotées par Placement (scenes/brb.config.js). */
    .scene[data-scene="brb"] .brb-block-right {
      display: flex; flex-direction: column;
    }
    .scene[data-scene="brb"] .brb-chat-label { margin-bottom: 16px; flex-shrink: 0; }
    .scene[data-scene="brb"] .brb-chat-rule { margin-bottom: 16px; }
    .scene[data-scene="brb"] [data-layer="chat"] { overflow: hidden; }
    .scene[data-scene="brb"] .brb-stats {
      position: absolute; left: 1174px; bottom: 140px; display: flex; gap: 40px;
      padding-top: 16px; border-top: 0.5px solid var(--color-rule);
    }
    .scene[data-scene="brb"] .brb-next {
      position: absolute; bottom: 0; left: 0; right: 0; height: 88px;
      background: var(--color-bg-widget); border-top: 0.5px solid var(--color-gold-dim);
      display: flex; align-items: center; padding: 0 80px; gap: 48px;
    }
    .scene[data-scene="brb"] .brb-next-label { flex-shrink: 0; }
    .scene[data-scene="brb"] .next-info { font-size: 34px; flex: 1; }
    .scene[data-scene="brb"] .next-topic { font-size: 34px; }
    .scene[data-scene="brb"] .brb-footer-link { flex-shrink: 0; }

    /* ════════════════ CODAGE ════════════════ */
    /* .cod-capture retiré (S8) — remplacé par le composant Box (options par défaut). */
    .scene[data-scene="codage"] .cod-separator {
      position: absolute; top: 40px; left: 1434px; width: 1px; height: 1000px; background: var(--color-rule);
    }
    .scene[data-scene="codage"] .cod-col-right {
      position: absolute; top: 40px; left: 1468px; width: 412px; height: 1000px;
      display: flex; flex-direction: column;
    }
    .scene[data-scene="codage"] .cod-block { flex-shrink: 0; }
    .scene[data-scene="codage"] .cod-name-block { padding-bottom: 14px; border-bottom: var(--border-gold); }
    .scene[data-scene="codage"] .cod-name { font-size: 54px; letter-spacing: -0.5px; line-height: 1; }
    .scene[data-scene="codage"] .cod-cam-mini {
      margin-top: 16px; width: 164px; height: 164px;
      border-radius: var(--radius-md); border: var(--border-panel); background: var(--color-bg-panel);
    }
    .scene[data-scene="codage"] .cod-section { padding: 18px 0; border-bottom: var(--border-rule); }
    .scene[data-scene="codage"] [data-layer="ide-context"] { height: 124px; }
    .scene[data-scene="codage"] .cod-label { margin-bottom: 8px; }
    .scene[data-scene="codage"] .file-name {
      font-family: var(--font-mono); font-size: 26px; color: var(--color-text-primary);
      margin-bottom: 6px; word-break: break-all;
    }
    .scene[data-scene="codage"] .git-branch { font-size: 20px; margin-bottom: 4px; }
    .scene[data-scene="codage"] .stack-info { font-family: var(--font-mono); font-size: 18px; color: var(--color-text-mid); }
    .scene[data-scene="codage"] [data-layer="stats"] { display: flex; gap: 32px; }
    .scene[data-scene="codage"] .cod-alert-strip {
      position: absolute; bottom: 20px; left: 40px; width: 1360px; height: 20px;
      display: flex; align-items: center;
    }
    .scene[data-scene="codage"] .cod-alert-text { letter-spacing: var(--tracking-label); }
    .scene[data-scene="codage"] .cod-footer {
      margin-top: auto; padding-top: 16px; border-top: 0.3px solid var(--color-gold-dim);
    }

    /* ════════════════ JEU ════════════════ */
    /* .cam-mini retiré (S8) — remplacé par le composant Box (background rgba custom), voir
       scenes/jeu.config.js. */
    .scene[data-scene="jeu"] .hud-bar {
      position: absolute; bottom: 0; left: 0; right: 0; height: 96px;
      background: rgba(10, 10, 12, 0.9); border-top: 0.5px solid rgba(200, 185, 122, 0.4);
      display: flex; align-items: center; padding: 0 28px;
    }
    .scene[data-scene="jeu"] .hud-cell {
      display: flex; flex-direction: column; gap: 6px;
      padding-right: 40px; border-right: 1px solid var(--color-rule); margin-right: 40px;
    }
    /* Générique (pas .hud-cell:last-child) : le dernier enfant du hud-bar est poussé à droite,
       quel que soit son type — S8 migration, le vote (PollBar, ComponentMount) a remplacé l'alerte
       (déplacée en bannière centrée, AlertBanner) comme dernier élément. */
    .scene[data-scene="jeu"] .hud-bar > *:last-child {
      margin-left: auto;
    }
    .scene[data-scene="jeu"] .hud-value { font-size: 26px; line-height: 1; }
    /* .poll-wrap/.poll-question/.poll-track/.poll-fill/.poll-ratio retirés (S8 migration) —
       remplacés par le composant PollBar (styles inline équivalents, voir components/index.js).
       .jeu-alert-cell/.jeu-alert-label/.jeu-alert-username retirés — l'alerte est désormais
       AlertBanner (bannière centrée, comme discussion/codage), plus une cellule HUD dédiée. */

    /* ════════════════ INTERVIEW ════════════════ */
    .scene[data-scene="interview"] .int-center-rule {
      border-left: 0.5px dashed rgba(200,185,122,0.3);
    }
    .scene[data-scene="interview"] .int-fiche-name { font-size: 38px; }
    .scene[data-scene="interview"] .int-fiche-v { height: 40px; }
    .scene[data-scene="interview"] .int-fiche-role { font-size: 20px; }
    /* Position/taille de .int-subject-bar pilotées par Placement (scenes/interview.config.js). */
    .scene[data-scene="interview"] .int-subject-bar {
      border: var(--border-rule); border-radius: var(--radius-md); background: var(--color-bg-widget);
      display: flex; align-items: center; padding: 0 24px; gap: 24px;
    }
    .scene[data-scene="interview"] .int-subject-label { flex-shrink: 0; }
    .scene[data-scene="interview"] .int-subject-v { height: 28px; }
    .scene[data-scene="interview"] .int-subject-text { font-size: 28px; }
    .scene[data-scene="interview"] .int-col-chat {
      position: absolute; top: 40px; left: 1600px; width: 280px; height: 860px;
      display: flex; flex-direction: column; gap: 0; border-left: var(--border-rule); padding-left: 24px;
    }
    .scene[data-scene="interview"] .int-chat-label { margin-bottom: 12px; }
    .scene[data-scene="interview"] [data-layer="chat"] { flex: 1; min-height: 0; overflow: hidden; }
    .scene[data-scene="interview"] [data-layer="stats"] {
      margin-top: auto; padding-top: 16px; border-top: var(--border-rule); display: flex; flex-direction: column; gap: 12px;
    }

    /* ════════════════ REACT ════════════════ */
    /* .react-source-zone/.react-cam retirés (S8) — remplacés par le composant Box (défauts).
       .react-source-credit garde son CSS (contenu structuré, pas un simple placeholder). */
    .scene[data-scene="react"] .react-source-credit {
      border: 0.5px solid var(--color-gold); border-radius: var(--radius-md); background: var(--color-bg-widget);
      display: flex; align-items: center; padding: 0 24px; gap: 20px;
    }
    .scene[data-scene="react"] .react-credit-label { flex-shrink: 0; }
    .scene[data-scene="react"] .react-credit-v { height: 32px; }
    .scene[data-scene="react"] .react-credit-title {
      font-size: 30px; flex: 1;
      overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
    }
    .scene[data-scene="react"] .react-credit-platform { font-size: 20px; flex-shrink: 0; }
    .scene[data-scene="react"] .react-sep {
      position: absolute; top: 40px; left: 1134px; width: 1px; height: 980px; background: var(--color-rule);
    }
    .scene[data-scene="react"] .react-col-chat {
      position: absolute; top: 520px; left: 1168px; width: 712px; height: 500px;
      display: flex; flex-direction: column;
    }
    .scene[data-scene="react"] .react-chat-label { margin-bottom: 12px; flex-shrink: 0; }
    .scene[data-scene="react"] [data-layer="chat"] { flex: 1; overflow: hidden; }
    .scene[data-scene="react"] .react-hud-bottom {
      position: absolute; bottom: 0; left: 0; right: 0; height: 60px;
      background: var(--color-bg-widget); border-top: var(--border-rule);
      display: flex; align-items: center; padding: 0 40px; gap: 40px;
    }
    .scene[data-scene="react"] .react-hud-name { font-size: 28px; }
    .scene[data-scene="react"] .react-hud-v    { height: 28px; }
    .scene[data-scene="react"] .react-hud-val  { font-size: 22px; }
    .scene[data-scene="react"] .react-hud-pair { display: flex; flex-direction: column; gap: 2px; }
    .scene[data-scene="react"] .react-hud-link { margin-left: auto; }

    /* ════════════════ CREATION (variante A uniquement, voir docs/inbox.md) ════════════════ */
    /* .creation-capture-zone retiré (S8) — remplacé par le composant Box (options par défaut). */
    .scene[data-scene="creation"] .creation-sep {
      position: absolute; top: 40px; left: 1434px; width: 1px; height: 1000px; background: var(--color-rule);
    }
    .scene[data-scene="creation"] .creation-col-right {
      position: absolute; top: 40px; left: 1468px; width: 412px; height: 1000px; display: flex; flex-direction: column;
    }
    .scene[data-scene="creation"] .creation-name-block { height: 184px; padding-bottom: 14px; border-bottom: var(--border-gold); flex-shrink: 0; }
    .scene[data-scene="creation"] .creation-name-block h1 { font-size: 48px; letter-spacing: -0.5px; line-height: 1; }
    .scene[data-scene="creation"] .creation-cam-mini {
      width: 120px; height: 120px; border-radius: var(--radius-md);
      border: var(--border-panel); background: var(--color-bg-panel); flex-shrink: 0;
    }
    .scene[data-scene="creation"] .creation-section { padding: 16px 0; border-bottom: var(--border-rule); flex-shrink: 0; }
    .scene[data-scene="creation"] [data-layer="tool"] { height: 121px; }
    .scene[data-scene="creation"] .creation-label { margin-bottom: 8px; }
    .scene[data-scene="creation"] .creation-tool-name   { font-family: var(--font-mono); font-size: 22px; color: var(--color-text-primary); margin-bottom: 4px; }
    .scene[data-scene="creation"] .creation-tool-detail { font-size: 16px; margin-bottom: 4px; }
    .scene[data-scene="creation"] .creation-tool-app    { font-family: var(--font-mono); font-size: 14px; color: var(--color-text-mid); }
    .scene[data-scene="creation"] .creation-footer {
      margin-top: auto; padding-top: 16px; border-top: 0.3px solid var(--color-gold-dim);
    }

    /* ════════════════ FIN DE STREAM ════════════════ */
    .scene[data-scene="fin"] .fin-bar-bot-full {
      position: absolute; bottom: 0; left: 0; right: 0; height: 2.5px; background: var(--color-gold); opacity: 0.8;
    }
    /* .fin-cam retiré (S8) — remplacé par le composant Box (options par défaut). */
    .scene[data-scene="fin"] .fin-sep {
      position: absolute; top: 40px; left: 880px; width: 1px; height: 1000px; background: var(--color-rule);
    }
    .scene[data-scene="fin"] .fin-col-right {
      position: absolute; top: 40px; left: 920px; width: 960px; height: 1000px; display: flex; flex-direction: column;
    }
    .scene[data-scene="fin"] .fin-name-block { padding-bottom: 18px; border-bottom: var(--border-gold); flex-shrink: 0; }
    .scene[data-scene="fin"] .fin-name-block h1 { font-size: 80px; letter-spacing: -1px; line-height: 1; }
    .scene[data-scene="fin"] .fin-section { padding: 22px 0; border-bottom: var(--border-rule); flex-shrink: 0; }
    .scene[data-scene="fin"] [data-layer="next-stream"] { height: 101px; }
    .scene[data-scene="fin"] .fin-label {
      margin-bottom: 14px;
    }
    .scene[data-scene="fin"] .fin-recap-line { font-size: 32px; line-height: 1.5; }
    .scene[data-scene="fin"] .fin-recap-line.dim { color: var(--color-text-mid); }
    .scene[data-scene="fin"] .fin-next-when  { font-size: 38px; margin-bottom: 6px; }
    .scene[data-scene="fin"] .fin-next-topic { font-size: 36px; }
    .scene[data-scene="fin"] .fin-stats-grid { height: 59px; }
    /* Conteneur .fin-links-list retiré (S8) — display:flex/gap fournis par le composant TextList. */
    .scene[data-scene="fin"] .fin-link-item  { font-size: 26px; }
    .scene[data-scene="fin"] .fin-link-item.dim { color: var(--color-text-mid); }
    .scene[data-scene="fin"] .fin-footer {
      margin-top: auto; padding-top: 16px; border-top: 0.3px solid var(--color-gold-dim);
    }

    /* ════════════════ STARTING (écran d'attente pré-live) ════════════════ */
    .scene[data-scene="starting"] .starting-center {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center; gap: 28px;
    }
    .scene[data-scene="starting"] .starting-name { font-size: 140px; letter-spacing: -2px; line-height: 0.9; }
    .scene[data-scene="starting"] .starting-rule-gold { width: 320px; }
    .scene[data-scene="starting"] .starting-subject-text { font-size: 38px; max-width: 1200px; }
    /* display:flex/gap fournis par le composant TextList lui-même (S8) — seul margin-top reste ici. */
    .scene[data-scene="starting"] .starting-links-list {
      margin-top: 12px;
    }
    .scene[data-scene="starting"] .starting-link-item { font-size: 24px; }
    .scene[data-scene="starting"] .starting-link-item.dim { color: var(--color-text-mid); }
  </style>
</head>
<body>
  <!-- Fond DotGrid permanent (instance unique montée par le runtime) -->
  <div id="bg-layer"></div>

  <!-- Conteneur des scènes -->
  <div id="scene-root"></div>

  <!-- ════════════════ Templates de scène (structure + placement, AD-5) ════════════════ -->

  <template data-scene="brb">
    <div data-layer="goldbar"></div>
    <div data-layer="message" class="brb-block-left"></div>
    <div class="brb-separator" aria-hidden="true"></div>
    <div data-layer="chat" class="brb-block-right">
      <div class="brb-chat-label label-mono">Chat</div>
      <div class="brb-chat-rule rule-h"></div>
    </div>
    <div data-layer="stats" class="brb-stats"></div>
    <div data-layer="next-stream" class="brb-next"></div>
  </template>

  <template data-scene="codage">
    <div data-layer="goldbar"></div>
    <div data-layer="ide-zone" aria-hidden="true"></div>
    <div class="cod-separator" aria-hidden="true"></div>
    <div class="cod-col-right">
      <div data-layer="cam-mini" class="cod-block">
        <div class="cod-name-block"><h1 class="cod-name heading-serif">D0n</h1></div>
        <div class="cod-cam-mini" aria-hidden="true"></div>
      </div>
      <div data-layer="ide-context" class="cod-block cod-section"></div>
      <div data-layer="pomodoro" class="cod-block cod-section"></div>
      <div data-layer="stats" class="cod-block cod-section"></div>
      <div class="cod-footer text-ghost">twitch.tv/d0natelll0</div>
    </div>
    <div data-layer="alert">
      <div class="cod-alert-strip"><span class="cod-alert-text text-ghost"></span></div>
    </div>
  </template>

  <template data-scene="jeu">
    <div data-layer="goldbar"></div>
    <div data-layer="cam" aria-hidden="true"></div>
    <div data-layer="hud" class="hud-bar">
      <div class="hud-cell">
        <span class="hud-label label-mono">D0n</span>
        <span class="hud-value value-mono gold jeu-session">—</span>
      </div>
      <div class="hud-cell">
        <span class="hud-label label-mono">Durée</span>
        <span class="hud-value value-mono jeu-duration">00:00:00</span>
      </div>
      <!-- Vote chat (PollBar) monté par scenes/data/jeu.scene.json — masqué hors vote actif par
           jeu.wire.js (S8 migration, $bind ne sait pas exprimer "masquer si null"). -->
    </div>
    <!-- Alerte : AlertBanner (bannière centrée), unifié avec discussion/codage (S8 migration,
         remplace la cellule HUD dédiée). -->
    <div data-layer="alert"></div>
  </template>

  <template data-scene="interview">
    <div data-layer="goldbar"></div>
    <div data-layer="subject" class="int-subject-bar"></div>
    <div class="int-col-chat">
      <span class="int-chat-label label-mono">Chat</span>
      <div data-layer="chat"></div>
      <div data-layer="stats"></div>
    </div>
  </template>

  <template data-scene="react">
    <div data-layer="goldbar"></div>
    <div data-layer="source-zone" aria-hidden="true"></div>
    <div data-layer="source-credit" class="react-source-credit"></div>
    <div class="react-sep" aria-hidden="true"></div>
    <div data-layer="cam" aria-hidden="true"></div>
    <div class="react-col-chat">
      <span class="react-chat-label label-mono">Chat</span>
      <div data-layer="chat"></div>
    </div>
    <div data-layer="hud" class="react-hud-bottom">
      <span class="react-hud-name heading-serif">D0n</span>
      <div class="react-hud-v rule-v"></div>
      <div class="react-hud-pair"><span class="react-hud-lbl label-mono">Durée</span><span class="react-hud-val value-mono-gold react-hud-duration">00:00</span></div>
      <span class="react-hud-link text-ghost">twitch.tv/d0natelll0</span>
    </div>
  </template>

  <template data-scene="creation">
    <div data-layer="goldbar"></div>
    <div data-layer="capture-zone" aria-hidden="true"></div>
    <div class="creation-sep" aria-hidden="true"></div>
    <div class="creation-col-right">
      <div data-layer="cam-mini" class="creation-name-block"></div>
      <div data-layer="tool" class="creation-section"></div>
      <div data-layer="pomodoro" class="creation-section"></div>
      <div class="creation-footer text-ghost">twitch.tv/d0natelll0</div>
    </div>
  </template>

  <template data-scene="fin">
    <div data-layer="goldbar"></div>
    <div class="fin-bar-bot-full" aria-hidden="true"></div>
    <div data-layer="cam" aria-hidden="true"></div>
    <div class="fin-sep" aria-hidden="true"></div>
    <div class="fin-col-right">
      <div class="fin-name-block"><h1 class="heading-serif">D0n</h1></div>
      <div data-layer="recap" class="fin-section">
        <span class="fin-label label-mono">Session — Récap</span>
      </div>
      <div data-layer="next-stream" class="fin-section"></div>
      <div data-layer="stats" class="fin-section fin-stats-grid"></div>
      <div data-layer="links" class="fin-section">
        <span class="fin-label label-mono">Liens</span>
      </div>
      <div class="fin-footer text-ghost">Mozaïk · À bientôt</div>
    </div>
  </template>

  <template data-scene="starting">
    <div data-layer="goldbar"></div>
    <div data-layer="message" class="starting-center">
      <span class="starting-tag label-mono wide">— Démarrage imminent —</span>
      <h1 class="starting-name heading-serif">D0n</h1>
      <div class="starting-rule-gold rule-h-gold"></div>
      <div class="starting-subject-text value-serif">Au programme aujourd'hui — surprise.</div>
      <div data-layer="links" class="starting-links-list"></div>
    </div>
  </template>

  <script type="module" src="./scene-runtime.js"></script>

  <!--
    Auto-reload dev (opt-in, jamais actif dans OBS) : ouvrir l'onglet de preview sur
    "http://localhost:<port>/?livereload=1" pour qu'il se recharge automatiquement à chaque
    sauvegarde depuis dev/tuner-server.js (dotgrid-tuner.html), dev/placement-server.js (placement)
    ou dev/scene-data-server.js (composition/création/suppression de scène, LAC-03 résolu
    2026-07-05). Sans le paramètre, ce bloc ne fait rien — zéro impact sur la Browser Source OBS
    (URL sans paramètre dans docs/obs-setup.md).
  -->
  <script type="module">
    if (new URLSearchParams(location.search).get('livereload') === '1') {
      const ports = [4458, 4459, 4460]; // tuner-server (DotGrid), placement-server, scene-data-server
      ports.forEach((port) => {
        try {
          new WebSocket(`ws://localhost:${port}/reload-ws`).onmessage = () => location.reload();
        } catch { /* serveur de dev non lancé sur ce port — ignoré */ }
      });
    }
  </script>
</body>
</html>
