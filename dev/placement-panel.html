<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Dev — Placement Panel</title>
  <!--
    OUTIL DE DEV — jamais chargé dans OBS, jamais référencé depuis index.html.
    Charge une SceneConfig (scenes/registry.js) + le template/CSS réel depuis index.html (fetch,
    même origine), affiche les couches ayant un `placement` (docs/specs/scene-placement-protocol.md)
    en rectangles déplaçables à la souris. Les couches sans `placement` (CSS scopé existant) sont
    affichées mais non déplaçables — hors scope V1 (pas d'insertion de placement, seulement
    déplacement d'un placement existant).
    Persistance placement (S7) : bouton "Sauvegarder" -> POST vers dev/placement-server.js
    (bun dev/placement-server.js, outil de dev séparé, jamais lancé en live).

    Composition (S8 session 5/6) : ajouter/retirer/éditer les ComponentMount d'une couche, un
    formulaire par type (dev/component-field-schemas.js) -> POST vers dev/scene-data-server.js
    (/update-scene, bun dev/scene-data-server.js, S8 session 4/6).

    Création/suppression de scène + gestion minimale des couches (S8 session 6/6) : création
    (id + couche goldbar minimale) -> POST /create-scene ; suppression de SCÈNE (confirmation
    navigateur conservée, action rare/lourde) -> POST /delete-scene, qui ARCHIVE le fichier
    (scenes/data/archived/) plutôt que de le supprimer. Ajouter/supprimer une couche entière
    (bouton désactivé sur goldbar, invariant V4) réutilise POST /update-scene, pas de nouvelle route.

    Sauvegarde automatique + historique (2026-07-05, voir docs/specs/scene-history-protocol.md) :
    plus de bouton "Enregistrer" par composant — chaque modification de champ sauvegarde au `change`
    (perte de focus/validation, pas à chaque frappe). Plus de confirmation navigateur sur retrait de
    couche/composant — l'historique (section dédiée, "Restaurer" par version horodatée) remplace la
    confirmation comme filet de sécurité pour ces actions courantes et réversibles. L'historique est
    partagé (dev/scene-history-store.js) entre scene-data-server.js (composition/création/suppression)
    ET placement-server.js (drag & drop) — un déplacement de couche est donc aussi annulable via la
    section Historique, pas seulement les changements de composition.

    Gestion des couches (2026-07-05) : renommer (input inline, invariants V6/goldbar respectés),
    réordonner (boutons ↑/↓ + glisser-déposer via poignée dédiée) — modifie l'empilement visuel des
    couches qui se chevauchent. Réutilise POST /update-scene, pas de nouvelle route.

    Placement individuel par composant (2026-07-05) : la preview monte désormais réellement les
    composants de chaque couche (COMPONENT_REGISTRY, synthèse de couche manquante comme
    scene-runtime.js) au lieu de ne cloner que le template statique — une scène/couche entièrement
    dynamique s'affiche enfin. Bouton "Positionner" assigne un `ComponentMount.placement` (rectangle
    générique, pas de redimensionnement — même limite que le placement de couche, S7 V1) ; devient
    alors déplaçable (poignée verte, distincte de l'or pour les couches). Auto-sauvegarde au
    relâchement, comme le reste du panneau.
  -->
  <link rel="stylesheet" href="../tokens.css">
  <style>
    html, body { width: auto; height: auto; overflow: auto; background: var(--color-bg); }
    body { display: flex; height: 100vh; font-family: var(--font-mono); color: var(--color-text-primary); }

    #preview {
      position: relative; flex: 1; overflow: hidden; background: #000;
      display: flex; align-items: center; justify-content: center;
    }
    #preview-surface { position: relative; width: 1920px; height: 1080px; transform-origin: center center; flex-shrink: 0; }

    /* Rectangles déplaçables — par-dessus le rendu réel de la scène */
    .placement-handle {
      outline: 2px dashed var(--color-gold); outline-offset: -2px;
      cursor: grab; box-sizing: border-box;
    }
    .placement-handle.dragging { cursor: grabbing; outline-color: #fff; }
    .placement-handle-label {
      position: absolute; top: 4px; left: 4px; padding: 2px 6px;
      background: rgba(10,10,12,0.85); color: var(--color-gold);
      font-family: var(--font-mono); font-size: 11px; pointer-events: none; white-space: nowrap;
    }
    /* Placement individuel par composant (2026-07-05) — outline vert pour distinguer d'un coup
       d'œil d'un placement de COUCHE (outline or, .placement-handle seul). */
    .component-handle { outline-color: #7BC8A4; z-index: 5; }
    .component-handle.dragging { outline-color: #fff; }
    .component-handle-label { color: #7BC8A4; }

    #panel {
      width: 440px; flex-shrink: 0; padding: 0; overflow-y: auto;
      border-left: var(--border-rule); display: flex; flex-direction: column;
      background: var(--color-bg);
    }

    /* ─── Boutons (base commune, tout le panneau) ────────────────────────────── */
    .btn {
      padding: 7px 10px; background: var(--color-bg-widget); color: var(--color-gold);
      border: 0.5px solid var(--color-gold); border-radius: var(--radius-md); cursor: pointer;
      font-family: var(--font-mono); font-size: 12px; white-space: nowrap;
    }
    .btn:hover { background: rgba(200,185,122,0.12); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-danger { border-color: #C85A5A; color: #E08A8A; }
    .btn-danger:hover { background: rgba(200,90,90,0.12); }
    .btn-ghost { background: transparent; border-color: var(--color-rule); color: var(--color-text-mid); }
    .btn-ghost:hover { background: rgba(255,255,255,0.04); border-color: var(--color-text-mid); }
    .btn-small { font-size: 11px; padding: 5px 8px; }
    .btn-block { width: 100%; }

    /* ─── Structure générale : header sticky + statut + sections ────────────── */
    .panel-header {
      position: sticky; top: 0; z-index: 2; background: var(--color-bg);
      padding: 18px 20px 10px; border-bottom: var(--border-rule);
    }
    .panel-header h1 { font-family: var(--font-serif); font-size: 20px; color: var(--color-gold); }

    #status {
      position: sticky; top: 54px; z-index: 2; margin: 0; padding: 8px 20px;
      font-size: 12px; min-height: 16px; border-bottom: var(--border-rule);
      background: var(--color-bg-widget); color: var(--color-text-mid);
      transition: background 0.2s ease, color 0.2s ease;
    }
    #status:empty { padding: 0; min-height: 0; border-bottom: none; }
    #status.status-success { background: rgba(120, 180, 120, 0.12); color: #9FCB9F; }
    #status.status-error   { background: rgba(200, 90, 90, 0.14); color: #E08A8A; }
    #status.status-pending { background: rgba(200, 185, 122, 0.10); color: var(--color-gold); }

    .panel-section { padding: 16px 20px; border-bottom: var(--border-rule); }
    .panel-section .section-title-row {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
    }
    .section-title, summary.section-title {
      font-family: var(--font-mono); font-size: var(--text-xs); color: var(--color-text-mid);
      letter-spacing: var(--tracking-label); text-transform: uppercase; display: block; margin-bottom: 10px;
      cursor: default;
    }
    details.panel-section { padding: 0; }
    details.panel-section > summary.section-title {
      padding: 16px 20px; margin-bottom: 0; cursor: pointer; list-style: none;
      display: flex; align-items: center; justify-content: space-between;
    }
    details.panel-section > summary.section-title::-webkit-details-marker { display: none; }
    details.panel-section > summary.section-title::after { content: '▾'; font-size: 10px; }
    details.panel-section[open] > summary.section-title::after { content: '▴'; }
    details.panel-section > .section-body { padding: 0 20px 16px; }
    .badge {
      font-size: 10px; padding: 1px 7px; border-radius: 999px; color: var(--color-text-mid);
      border: 0.5px solid var(--color-rule); font-variant-numeric: tabular-nums;
    }

    select, input[type="text"], input[type="number"], textarea {
      width: 100%; padding: 7px; background: var(--color-bg-widget); color: var(--color-text-primary);
      border: var(--border-rule); border-radius: var(--radius-md); font-family: var(--font-mono); font-size: 12px;
      box-sizing: border-box;
    }
    textarea { min-height: 60px; resize: vertical; }

    /* ─── Scène ───────────────────────────────────────────────────────────────── */
    .scene-toolbar { display: flex; gap: 8px; margin-top: 10px; }
    .scene-toolbar .btn { flex: 1; }
    .inline-create { margin-top: 10px; }
    .inline-create > summary { font-size: 11px; color: var(--color-text-mid); cursor: pointer; list-style: none; }
    .inline-create > summary::-webkit-details-marker { display: none; }
    .inline-create > summary::before { content: '+ '; }
    .create-scene-row, .add-layer-row { display: flex; gap: 6px; margin-top: 8px; }
    .create-scene-row input, .add-layer-row input { flex: 1; }

    /* ─── Historique ──────────────────────────────────────────────────────────── */
    #history-list { display: flex; flex-direction: column; gap: 4px; max-height: 220px; overflow-y: auto; }
    .history-row {
      display: flex; justify-content: space-between; align-items: center; gap: 8px;
      padding: 6px 8px; border: var(--border-rule); border-radius: var(--radius-md); font-size: 11px;
    }
    .history-row.origin { border-color: var(--color-gold); }
    .history-row button { flex-shrink: 0; }
    .history-empty { font-size: 11px; color: var(--color-text-mid); font-style: italic; }

    /* ─── Couches ─────────────────────────────────────────────────────────────── */
    .layer-row {
      display: flex; flex-direction: column; gap: 8px; padding: 12px;
      border: var(--border-rule); border-radius: var(--radius-md); margin-bottom: 10px;
      background: rgba(255,255,255,0.015);
    }
    .layer-row:last-child { margin-bottom: 0; }
    .layer-row .row-head { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .layer-row .layer-name-group { display: flex; align-items: center; gap: 8px; min-width: 0; flex: 1; }
    .layer-row .layer-name { color: var(--color-gold); font-size: 13px; }
    .layer-name-input {
      color: var(--color-gold); font-size: 13px; background: transparent; border: 0.5px solid transparent;
      padding: 2px 4px; width: auto; min-width: 0; flex: 1;
    }
    .layer-name-input:hover, .layer-name-input:focus { border-color: var(--color-rule); background: var(--color-bg-widget); }
    .layer-row .layer-coords { font-size: 11px; color: var(--color-text-mid); font-variant-numeric: tabular-nums; }
    .layer-tag {
      font-size: 9px; padding: 1px 6px; border-radius: 999px; text-transform: uppercase; letter-spacing: 0.06em;
      flex-shrink: 0;
    }
    .layer-tag.draggable { color: var(--color-gold); border: 0.5px solid var(--color-gold); }
    .layer-tag.fixed { color: var(--color-text-mid); border: 0.5px solid var(--color-rule); }
    .layer-row.unmigrated { opacity: 0.85; } /* le tag suffit à signaler l'état, plus besoin d'assombrir tout le bloc */
    .layer-placement-actions { display: flex; gap: 8px; }
    .layer-placement-actions .btn { flex: 1; }

    /* Gestion des couches — glisser-déposer + réordonnancement (2026-07-05) */
    .drag-handle { cursor: grab; color: var(--color-text-mid); flex-shrink: 0; user-select: none; }
    .drag-handle:active { cursor: grabbing; }
    .layer-row.dragging-row { opacity: 0.4; }
    .layer-row.drag-over-row { border-color: var(--color-gold); }
    .layer-order-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .layer-order-actions .btn { padding: 5px 8px; }

    /* Composition (S8 session 5/6) */
    .components-section {
      display: flex; flex-direction: column; gap: 8px; margin-top: 4px;
      padding-top: 8px; border-top: 0.5px dashed var(--color-rule);
    }
    .component-block {
      display: flex; flex-direction: column; gap: 6px; padding: 8px;
      border: 1px dashed var(--color-text-mid); border-radius: var(--radius-md);
    }
    .component-head { display: flex; justify-content: space-between; align-items: center; }
    .component-type { color: var(--color-gold); font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; }
    .field-row { display: flex; align-items: center; gap: 6px; }
    .field-row label { flex: 0 0 auto; font-size: 11px; color: var(--color-text-mid); min-width: 90px; }
    .field-row input, .field-row select, .field-row textarea { flex: 1; }
    .bind-toggle { flex: 0 0 auto; padding: 4px 6px; font-size: 10px; }
    .add-component-row { display: flex; gap: 6px; margin-top: 4px; }
    .add-component-row select { flex: 1; }
    .add-component-row button { flex: 0 0 auto; }
  </style>
</head>
<body>
  <div id="preview"><div id="preview-surface"></div></div>

  <div id="panel">
    <div class="panel-header">
      <h1>Placement Panel</h1>
    </div>

    <div id="status"></div>

    <section class="panel-section">
      <span class="section-title">Scène</span>
      <select id="scene-select"></select>
      <div class="scene-toolbar">
        <button id="delete-scene-btn" class="btn btn-danger">Supprimer cette scène</button>
      </div>
      <details class="inline-create">
        <summary>Nouvelle scène</summary>
        <div class="create-scene-row">
          <input type="text" id="new-scene-id" placeholder="id-nouvelle-scene">
          <button id="create-scene-btn" class="btn">Créer</button>
        </div>
      </details>
    </section>

    <section class="panel-section">
      <span class="section-title">Transition</span>
      <div id="transition-fields"></div>
    </section>

    <section class="panel-section">
      <span class="section-title">Fond</span>
      <div id="background-fields"></div>
    </section>

    <details class="panel-section history-section">
      <summary class="section-title">Historique</summary>
      <div class="section-body">
        <div id="history-list"></div>
      </div>
    </details>

    <details class="panel-section archives-section">
      <summary class="section-title">Archives <span id="archived-count" class="badge"></span></summary>
      <div class="section-body">
        <div id="archived-list"></div>
      </div>
    </details>

    <details class="panel-section obs-section" open>
      <summary class="section-title">OBS</summary>
      <div class="section-body">
        <div id="obs-status" class="history-empty"></div>
        <select id="obs-scene-select"></select>
        <div class="scene-toolbar">
          <button id="obs-activate-btn" class="btn btn-small">Activer</button>
        </div>
        <details class="inline-create">
          <summary>Nouvelle scène OBS</summary>
          <div class="create-scene-row">
            <input type="text" id="obs-new-scene-name" placeholder="Nom de la scène OBS">
            <button id="obs-create-scene-btn" class="btn">Créer</button>
          </div>
        </details>
        <div id="obs-scene-items" style="margin-top: 12px;"></div>
        <div class="add-layer-row">
          <input type="text" id="obs-new-source-name" placeholder="nom-source-existante">
          <button id="obs-add-source-btn" class="btn">+ source</button>
        </div>
      </div>
    </details>

    <section class="panel-section">
      <div class="section-title-row">
        <span class="section-title" style="margin-bottom: 0;">Couches</span>
        <button id="reset-all-btn" class="btn btn-ghost btn-small">Réinitialiser placements</button>
      </div>
      <div class="add-layer-row">
        <input type="text" id="new-layer-name" placeholder="nom-de-couche">
        <button id="add-layer-btn" class="btn">+ couche</button>
      </div>
      <div id="layer-list" style="margin-top: 12px;"></div>
    </section>
  </div>

  <script type="module">
    import { SCENE_CONFIGS, loadDynamicScenes } from '../scenes/registry.js';
    import { OBS_SCENE_MAP } from '../relay/obs-scene-map.js';
    import { DEFAULT_TRANSITION } from '../protocol.js';
    import { COMPONENT_FIELD_SCHEMAS, COMPOSABLE_COMPONENT_NAMES, BACKGROUND_FIELD_SCHEMAS, BACKGROUND_COMPONENT_NAMES } from './component-field-schemas.js';
    import { DESIGN_TOKENS, tokenLabel } from './design-tokens.js';
    // Montage réel des composants dans la preview (2026-07-05) — component-registry.js et
    // scene-definition-resolve.js sont sûrs à importer ici : aucun des deux n'importe store.js
    // (contrairement à scenes/registry.js, déjà chargé plus haut sans souci car c'est justement
    // scenes/registry.js qui expose loadDynamicScenes, pas un import direct des wire.js).
    import { COMPONENT_REGISTRY } from '../component-registry.js';
    import { resolveBoundOptions } from '../scene-definition-resolve.js';

    const PLACEMENT_SERVER_URL = 'http://localhost:4459/save-placement';
    const SCENE_DATA_SERVER_URL = 'http://localhost:4460/update-scene';
    const SCENE_DATA_CREATE_URL = 'http://localhost:4460/create-scene';
    const SCENE_DATA_DELETE_URL = 'http://localhost:4460/delete-scene';
    const SCENE_HISTORY_URL = 'http://localhost:4460/scene-history';
    const SCENE_RESTORE_URL = 'http://localhost:4460/restore-scene';
    const ARCHIVED_SCENES_URL = 'http://localhost:4460/archived-scenes';
    const RESTORE_ARCHIVED_URL = 'http://localhost:4460/restore-archived-scene';
    // Contrôle OBS (S6, 2026-07-06, voir docs/specs/obs-scene-control.md) — routes exposées par
    // relay/server.js, pas scene-data-server.js/placement-server.js (relais = seul process tournant
    // pendant le live, propriétaire unique de la connexion OBS WS v5).
    const OBS_LIST_SCENES_URL = 'http://localhost:4456/obs/list-scenes';
    const OBS_CREATE_SCENE_URL = 'http://localhost:4456/obs/create-scene';
    const OBS_SET_CURRENT_SCENE_URL = 'http://localhost:4456/obs/set-current-scene';
    const OBS_LIST_SCENE_ITEMS_URL = 'http://localhost:4456/obs/list-scene-items';
    const OBS_CREATE_SCENE_ITEM_URL = 'http://localhost:4456/obs/create-scene-item';
    const OBS_SET_SCENE_ITEM_TRANSFORM_URL = 'http://localhost:4456/obs/set-scene-item-transform';
    const OBS_SET_SCENE_ITEM_ENABLED_URL = 'http://localhost:4456/obs/set-scene-item-enabled';
    // Même pattern que dev/dotgrid-tuner.html : le secret vit dans obs-config.local.js (gitignoré),
    // jamais en dur ici. Absent en dev pur (pas d'OBS ouvert) → section OBS best-effort, n'échoue
    // jamais bruyamment (voir refreshObsScenes).
    const { RELAY_TOKEN } = await import('../obs-config.local.js').catch(() => import('../obs-config.example.js'));
    /** Même motif que scene-data-server.js — validation côté client avant l'appel réseau (AC-32). */
    const VALID_SCENE_ID = /^[a-z][a-z0-9-]*$/;

    // Les 9 scènes historiques sont désormais des scènes dynamiques (JSON, S8 migration) —
    // SCENE_CONFIGS est vide tant que ce chargement n'a pas résolu (review S8 session 4/6).
    await loadDynamicScenes();

    /** Nom(s) de scène OBS pointant vers chaque mode overlay — affichage seulement. */
    const OBS_NAMES_BY_SCENE = Object.entries(OBS_SCENE_MAP).reduce((acc, [obsName, sceneId]) => {
      (acc[sceneId] ??= []).push(obsName);
      return acc;
    }, /** @type {Record<string, string[]>} */ ({}));

    const preview = document.getElementById('preview');
    const surface = document.getElementById('preview-surface');
    const sceneSelect = document.getElementById('scene-select');
    const layerList = document.getElementById('layer-list');
    const transitionFieldsEl = document.getElementById('transition-fields');
    const backgroundFieldsEl = document.getElementById('background-fields');
    const statusEl = document.getElementById('status');
    const historyList = document.getElementById('history-list');
    const archivedList = document.getElementById('archived-list');
    const archivedCount = document.getElementById('archived-count');
    const obsStatusEl = document.getElementById('obs-status');
    const obsSceneSelect = document.getElementById('obs-scene-select');
    const obsSceneItemsEl = document.getElementById('obs-scene-items');

    // Colore #status automatiquement selon son contenu — aucun appelant n'a besoin de changer
    // (tous les call sites existants font juste `statusEl.textContent = ...`, feedback peu clair
    // signalé par l'owner 2026-07-05, corrigé sans toucher à chaque site d'appel).
    new MutationObserver(() => {
      const text = statusEl.textContent ?? '';
      statusEl.classList.remove('status-success', 'status-error', 'status-pending');
      if (!text) return;
      if (/Échec|injoignable|invalide|déjà pris|vide|introuvable/.test(text)) statusEl.classList.add('status-error');
      else if (/en cours\.\.\.$/.test(text)) statusEl.classList.add('status-pending');
      else statusEl.classList.add('status-success');
    }).observe(statusEl, { childList: true, characterData: true, subtree: true });

    /** @type {Document | null} */
    let indexDoc = null;
    let currentSceneId = Object.keys(SCENE_CONFIGS)[0];
    /** Copie de travail mutable de la scène courante (placement ET composition) — jamais SCENE_CONFIGS directement. */
    let liveConfig = null;
    /** État local des placements édités (sous-ensemble de liveConfig, pour le drag). */
    let livePlacements = {};
    /** Valeurs d'origine (au chargement de la scène), pour le bouton "Réinitialiser". */
    let originalPlacements = {};
    /** État local des placements de composants édités, clé `${layerName}::${index}` (2026-07-05). */
    let liveComponentPlacements = {};

    function scalePreview() {
      const scale = Math.min((preview.clientWidth - 40) / 1920, (preview.clientHeight - 40) / 1080);
      surface.dataset.scale = String(scale);
      surface.style.transform = `scale(${scale})`;
    }
    window.addEventListener('resize', scalePreview);

    async function loadIndexHtml() {
      const res = await fetch('../index.html');
      const html = await res.text();
      indexDoc = new DOMParser().parseFromString(html, 'text/html');
      // Réutiliser le CSS scopé réel (règles .scene[data-scene="x"] .foo { ... }) sans dupliquer à la main.
      const styleTag = indexDoc.querySelector('style');
      if (styleTag) document.head.appendChild(styleTag.cloneNode(true));
    }

    /** Reconstruit le menu déroulant depuis SCENE_CONFIGS — rappelable après création/suppression (S8 session 6/6). */
    function refreshSceneOptions(selectId) {
      sceneSelect.innerHTML = '';
      Object.keys(SCENE_CONFIGS).forEach((id) => {
        const opt = document.createElement('option');
        opt.value = id;
        const obsNames = OBS_NAMES_BY_SCENE[id];
        opt.textContent = obsNames ? `${obsNames.join(', ')} (${id})` : id;
        sceneSelect.appendChild(opt);
      });
      currentSceneId = selectId && Object.keys(SCENE_CONFIGS).includes(selectId) ? selectId : Object.keys(SCENE_CONFIGS)[0];
      sceneSelect.value = currentSceneId ?? '';
    }

    refreshSceneOptions(currentSceneId);
    sceneSelect.addEventListener('change', () => {
      currentSceneId = sceneSelect.value;
      renderScene();
    });
    document.getElementById('reset-all-btn').addEventListener('click', resetAllPlacements);
    document.getElementById('create-scene-btn').addEventListener('click', createScene);
    document.getElementById('delete-scene-btn').addEventListener('click', deleteScene);
    document.getElementById('add-layer-btn').addEventListener('click', addLayer);

    /** Créer une scène minimale (une couche goldbar) — AC-32, AC-33. */
    async function createScene() {
      const input = document.getElementById('new-scene-id');
      const id = input.value.trim();
      if (!VALID_SCENE_ID.test(id)) {
        statusEl.textContent = 'Id invalide — lettres minuscules/chiffres/tirets, doit commencer par une lettre';
        return;
      }

      /** @type {import('../types.js').SceneConfig} */
      const sceneConfig = {
        id,
        background: null,
        transition: DEFAULT_TRANSITION,
        layers: [
          {
            name: 'goldbar',
            components: [{ component: 'GoldBar', options: { position: 'top' } }],
            visibility: { full: true, minimal: true, hidden: true },
          },
        ],
      };

      statusEl.textContent = 'Création en cours...';
      try {
        const response = await fetch(SCENE_DATA_CREATE_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sceneConfig }),
        });
        if (!response.ok) {
          statusEl.textContent = `Échec (${response.status}) : ${await response.text()}`;
          return;
        }
        input.value = '';
        await loadDynamicScenes(); // fusionne la nouvelle scène dans SCENE_CONFIGS (additif, sans risque)
        refreshSceneOptions(id);
        renderScene();
        statusEl.textContent = `Scène créée : ${id}`;
      } catch {
        statusEl.textContent = 'Serveur de dev injoignable — lancer "bun dev/scene-data-server.js"';
      }
    }

    /** Supprimer (archiver) la scène courante — AC-34, AC-35. */
    async function deleteScene() {
      if (!currentSceneId) return;
      if (!window.confirm(`Supprimer la scène "${currentSceneId}" ? Le fichier sera archivé (scenes/data/archived/), pas détruit.`)) return;

      statusEl.textContent = 'Suppression en cours...';
      try {
        const response = await fetch(SCENE_DATA_DELETE_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sceneId: currentSceneId }),
        });
        if (!response.ok) {
          statusEl.textContent = `Échec (${response.status}) : ${await response.text()}`;
          return;
        }
        // loadDynamicScenes() ne retire jamais une clé (fusion additive, S8 session 4/6) — retrait explicite.
        delete SCENE_CONFIGS[currentSceneId];
        const deletedId = currentSceneId;
        refreshSceneOptions(null);
        if (currentSceneId) renderScene();
        else { surface.innerHTML = ''; layerList.innerHTML = ''; historyList.innerHTML = ''; }
        refreshArchivedScenes();
        statusEl.textContent = `Scène archivée : ${deletedId}`;
      } catch {
        statusEl.textContent = 'Serveur de dev injoignable — lancer "bun dev/scene-data-server.js"';
      }
    }

    /** Ajouter une couche vide à la scène courante — AC-37. Réutilise saveSceneConfig (session 5/6). */
    function addLayer() {
      const input = document.getElementById('new-layer-name');
      const name = input.value.trim();
      if (!name) { statusEl.textContent = 'Nom de couche vide'; return; }
      if (liveConfig.layers.some((l) => l.name === name)) { statusEl.textContent = `Nom de couche déjà pris : ${name}`; return; }

      liveConfig.layers.push({ name, components: [], visibility: { full: true, minimal: false, hidden: false } });
      input.value = '';
      saveSceneConfig(`ajout couche ${name}`);
      renderScene(); // pas juste renderLayerList : la nouvelle couche doit apparaître dans la preview
    }

    /**
     * Supprimer une couche entière — jamais `goldbar` (invariant V4, AC-36). Pas de confirmation :
     * l'historique (section dédiée) est le filet de sécurité pour cette action, pas une confirmation
     * ponctuelle (2026-07-05, voir docs/specs/scene-history-protocol.md).
     */
    function removeLayer(layerName) {
      liveConfig.layers = liveConfig.layers.filter((l) => l.name !== layerName);
      saveSceneConfig(`suppression couche ${layerName}`);
      renderScene(); // la couche retirée doit disparaître de la preview, pas juste du panneau latéral
    }

    /**
     * Renommer une couche — jamais `goldbar` (invariant V4, désactivé côté UI). Rejette un nom vide
     * ou déjà pris par une autre couche (invariant V6, "noms de couches uniques").
     * @param {string} oldName
     * @param {string} newName
     */
    function renameLayer(oldName, newName) {
      const trimmed = newName.trim();
      if (trimmed === oldName) return; // no-op, rien à sauvegarder
      if (!trimmed) { statusEl.textContent = 'Nom de couche vide'; renderLayerList(liveConfig); return; }
      if (liveConfig.layers.some((l) => l.name === trimmed)) {
        statusEl.textContent = `Nom de couche déjà pris : ${trimmed}`;
        renderLayerList(liveConfig); // revient à l'ancien nom affiché
        return;
      }
      const layer = liveConfig.layers.find((l) => l.name === oldName);
      layer.name = trimmed;
      saveSceneConfig(`renommage couche ${oldName} → ${trimmed}`);
      // renderScene (pas renderLayerList) : une couche renommée ne matche plus le [data-layer]
      // du template statique existant (si la couche vient d'une scène historique) — le montage
      // resynthétise une couche vide sous le nouveau nom, ce qui doit être visible immédiatement,
      // pas silencieux.
      renderScene();
    }

    /**
     * Déplacer une couche d'un cran (boutons ↑/↓) — change l'ordre de montage donc l'empilement
     * visuel des couches qui se chevauchent.
     * @param {number} index
     * @param {1|-1} direction
     */
    function moveLayer(index, direction) {
      const target = index + direction;
      if (target < 0 || target >= liveConfig.layers.length) return;
      const layers = liveConfig.layers;
      [layers[index], layers[target]] = [layers[target], layers[index]];
      saveSceneConfig('réordonnancement des couches');
      renderScene(); // l'ordre de montage change l'empilement visuel — doit se refléter dans la preview
    }

    function renderScene() {
      // Copie de travail unique : placement ET composition mutent liveConfig, jamais SCENE_CONFIGS
      // directement (S8 session 5/6 — évite qu'une sauvegarde de composition écrase un placement
      // fraîchement glissé-déposé avec une valeur périmée).
      liveConfig = structuredClone(SCENE_CONFIGS[currentSceneId]);
      const config = liveConfig;
      const template = indexDoc?.querySelector(`template[data-scene="${currentSceneId}"]`);

      surface.innerHTML = '';
      const wrapper = document.createElement('div');
      wrapper.className = 'scene';
      wrapper.dataset.scene = currentSceneId;
      if (template) wrapper.appendChild(template.content.cloneNode(true));
      surface.appendChild(wrapper);

      livePlacements = {};
      originalPlacements = {};
      liveComponentPlacements = {};
      config.layers.forEach((layer) => {
        if (layer.placement) {
          livePlacements[layer.name] = { ...layer.placement };
          originalPlacements[layer.name] = { ...layer.placement };
        }
      });

      // Montage réel des composants (2026-07-05) — jusqu'ici la preview ne clonait que le template
      // statique : une couche entièrement dynamique (ex. `cam` → Box) ou une scène créée par
      // l'éditeur (aucun template dans index.html) ne montrait littéralement rien. Même logique de
      // synthèse de couche que scene-runtime.js, en plus léger (pas de wire, pas de transitions —
      // ce n'est qu'une preview statique).
      config.layers.forEach((layer) => {
        let layerEl = wrapper.querySelector(`[data-layer="${layer.name}"]`);
        if (!layerEl) {
          layerEl = document.createElement('div');
          layerEl.dataset.layer = layer.name;
          wrapper.appendChild(layerEl);
        }

        layer.components.forEach((mount, index) => {
          const factory = COMPONENT_REGISTRY[mount.component];
          if (!factory) {
            console.warn(`[placement-panel] composant inconnu — ${mount.component}`);
            return;
          }
          /** @type {import('../types.js').ComponentInstance} */
          let instance;
          try {
            // État vide : un champ lié ($bind) s'affiche donc vide/par défaut dans cette preview
            // statique (pas de store.js ici — importer scenes/registry.js suffisait pour
            // loadDynamicScenes, mais store.js lui-même reste évité, voir le commentaire d'import
            // plus haut sur le bug de connexion WS parasite).
            instance = /** @type {*} */ (factory)(resolveBoundOptions(mount.options ?? {}, {}));
          } catch (err) {
            console.warn(`[placement-panel] échec du montage — ${mount.component}`, err);
            return;
          }
          layerEl.appendChild(instance.el);

          if (mount.placement) {
            const key = `${layer.name}::${index}`;
            liveComponentPlacements[key] = { ...mount.placement };
            applyPlacementStyle(instance.el, mount.placement);
            makeComponentDraggable(instance.el, layer.name, index);
          }
        });
      });

      config.layers.forEach((layer) => {
        if (!layer.placement) return;
        const el = wrapper.querySelector(`[data-layer="${layer.name}"]`);
        if (!(el instanceof HTMLElement)) return;
        makeDraggable(el, layer.name);
      });

      renderLayerList(config);
      renderTransitionSection(config);
      renderBackgroundSection(config);
      refreshHistory();
      statusEl.textContent = '';
    }

    // ─── Transition (Track A session 4) ──────────────────────────────────────

    const TRANSITION_TYPES_UI = ['crossfade', 'cut', 'slide', 'wipe', 'morph'];
    const TRANSITION_EASINGS_UI = ['easeInOut', 'easeIn', 'easeOut', 'linear'];
    const TRANSITION_DIRECTIONS_UI = ['left', 'right', 'up', 'down'];

    /**
     * Édite `liveConfig.transition` — auto-sauvegarde comme le reste du panneau. `direction`
     * n'apparaît que pour slide/wipe, `color` seulement pour wipe (docs/specs/scene-transition-library.md).
     * @param {import('../types.js').SceneConfig} config
     */
    function renderTransitionSection(config) {
      transitionFieldsEl.innerHTML = '';
      const t = config.transition;

      const typeRow = document.createElement('div');
      typeRow.className = 'field-row';
      const typeLabel = document.createElement('label');
      typeLabel.textContent = 'Type';
      typeRow.appendChild(typeLabel);
      const typeSelect = document.createElement('select');
      TRANSITION_TYPES_UI.forEach((type) => {
        const opt = document.createElement('option');
        opt.value = type;
        opt.textContent = type;
        typeSelect.appendChild(opt);
      });
      typeSelect.value = t.type;
      typeSelect.addEventListener('change', () => {
        t.type = typeSelect.value;
        saveSceneConfig('transition : type');
        renderTransitionSection(config); // direction/color apparaissent/disparaissent selon le type
      });
      typeRow.appendChild(typeSelect);
      transitionFieldsEl.appendChild(typeRow);

      const durationRow = document.createElement('div');
      durationRow.className = 'field-row';
      const durationLabel = document.createElement('label');
      durationLabel.textContent = 'Durée (ms)';
      durationRow.appendChild(durationLabel);
      const durationInput = document.createElement('input');
      durationInput.type = 'number';
      durationInput.min = '0';
      durationInput.value = String(t.duration);
      durationInput.addEventListener('change', () => {
        t.duration = Number(durationInput.value);
        saveSceneConfig('transition : durée');
      });
      durationRow.appendChild(durationInput);
      transitionFieldsEl.appendChild(durationRow);

      const easingRow = document.createElement('div');
      easingRow.className = 'field-row';
      const easingLabel = document.createElement('label');
      easingLabel.textContent = 'Easing';
      easingRow.appendChild(easingLabel);
      const easingSelect = document.createElement('select');
      TRANSITION_EASINGS_UI.forEach((easing) => {
        const opt = document.createElement('option');
        opt.value = easing;
        opt.textContent = easing;
        easingSelect.appendChild(opt);
      });
      easingSelect.value = t.easing;
      easingSelect.addEventListener('change', () => {
        t.easing = easingSelect.value;
        saveSceneConfig('transition : easing');
      });
      easingRow.appendChild(easingSelect);
      transitionFieldsEl.appendChild(easingRow);

      if (t.type === 'slide' || t.type === 'wipe') {
        const directionRow = document.createElement('div');
        directionRow.className = 'field-row';
        const directionLabel = document.createElement('label');
        directionLabel.textContent = 'Direction';
        directionRow.appendChild(directionLabel);
        const directionSelect = document.createElement('select');
        TRANSITION_DIRECTIONS_UI.forEach((direction) => {
          const opt = document.createElement('option');
          opt.value = direction;
          opt.textContent = direction;
          directionSelect.appendChild(opt);
        });
        directionSelect.value = t.direction ?? 'right';
        directionSelect.addEventListener('change', () => {
          t.direction = directionSelect.value;
          saveSceneConfig('transition : direction');
        });
        directionRow.appendChild(directionSelect);
        transitionFieldsEl.appendChild(directionRow);
      }

      if (t.type === 'wipe') {
        const colorRow = document.createElement('div');
        colorRow.className = 'field-row';
        const colorLabel = document.createElement('label');
        colorLabel.textContent = 'Couleur';
        colorRow.appendChild(colorLabel);

        // Même motif que le champ de type 'token' de buildComponentBlock (menu déroulant des
        // tokens connus + "Personnalisé...") — pas d'extraction en helper partagé pour un seul
        // usage supplémentaire (rule of three, CLAUDE.md).
        const tokens = DESIGN_TOKENS.color;
        const currentColor = t.color ?? 'var(--color-gold)';
        const isKnownToken = tokens.includes(currentColor);

        const wrapper = document.createElement('div');
        wrapper.style.cssText = 'flex:1; display:flex; flex-direction:column; gap:4px;';

        const colorSelect = document.createElement('select');
        tokens.forEach((token) => {
          const opt = document.createElement('option');
          opt.value = token;
          opt.textContent = tokenLabel(token);
          colorSelect.appendChild(opt);
        });
        const customOpt = document.createElement('option');
        customOpt.value = '__custom__';
        customOpt.textContent = 'Personnalisé...';
        colorSelect.appendChild(customOpt);
        colorSelect.value = isKnownToken ? currentColor : '__custom__';

        const customInput = document.createElement('input');
        customInput.type = 'text';
        customInput.placeholder = 'valeur CSS personnalisée';
        customInput.value = isKnownToken ? '' : currentColor;
        customInput.style.display = isKnownToken ? 'none' : 'block';

        colorSelect.addEventListener('change', () => {
          if (colorSelect.value === '__custom__') {
            customInput.style.display = 'block';
            customInput.focus();
          } else {
            customInput.style.display = 'none';
            t.color = colorSelect.value;
            saveSceneConfig('transition : couleur');
          }
        });
        customInput.addEventListener('change', () => { t.color = customInput.value; saveSceneConfig('transition : couleur'); });

        wrapper.appendChild(colorSelect);
        wrapper.appendChild(customInput);
        colorRow.appendChild(wrapper);
        transitionFieldsEl.appendChild(colorRow);
      }
    }

    // ─── Fond (Track B, session B7) ────────────────────────────────────────────

    /**
     * Édite `liveConfig.background` (`ComponentMount | null`) — un effet de fond parmi les 10
     * (9 + aucun), auto-sauvegarde comme Transition. Les champs d'options changent selon le
     * composant choisi (`BACKGROUND_FIELD_SCHEMAS`, docs/specs/background-effects-library.md).
     * @param {import('../types.js').SceneConfig} config
     */
    function renderBackgroundSection(config) {
      backgroundFieldsEl.innerHTML = '';
      const NONE = '__none__';

      const componentRow = document.createElement('div');
      componentRow.className = 'field-row';
      const componentLabel = document.createElement('label');
      componentLabel.textContent = 'Effet';
      componentRow.appendChild(componentLabel);

      const componentSelect = document.createElement('select');
      const noneOpt = document.createElement('option');
      noneOpt.value = NONE;
      noneOpt.textContent = '(aucun)';
      componentSelect.appendChild(noneOpt);
      BACKGROUND_COMPONENT_NAMES.forEach((name) => {
        const opt = document.createElement('option');
        opt.value = name;
        opt.textContent = name;
        componentSelect.appendChild(opt);
      });
      componentSelect.value = config.background?.component ?? NONE;
      componentSelect.addEventListener('change', () => {
        if (componentSelect.value === NONE) {
          config.background = null;
        } else {
          const schema = BACKGROUND_FIELD_SCHEMAS[componentSelect.value] ?? [];
          /** @type {Record<string, unknown>} */
          const options = {};
          schema.forEach((field) => { options[field.key] = field.default; });
          config.background = { component: componentSelect.value, options };
        }
        saveSceneConfig('fond : effet');
        renderBackgroundSection(config); // les champs d'options changent selon le composant choisi
      });
      componentRow.appendChild(componentSelect);
      backgroundFieldsEl.appendChild(componentRow);

      if (!config.background) return;

      const mount = config.background;
      const schema = BACKGROUND_FIELD_SCHEMAS[mount.component] ?? [];
      schema.forEach((field) => {
        const row = document.createElement('div');
        row.className = 'field-row';
        const labelEl = document.createElement('label');
        labelEl.textContent = field.label;
        row.appendChild(labelEl);

        const currentValue = mount.options[field.key] ?? field.default;
        row.appendChild(buildFieldInput(field, currentValue, (value) => {
          mount.options[field.key] = value;
          saveSceneConfig(`fond : ${field.label}`);
        }));
        backgroundFieldsEl.appendChild(row);
      });
    }

    // ─── Historique (2026-07-05) ──────────────────────────────────────────────

    /** Recharge et affiche l'historique de la scène courante. */
    async function refreshHistory() {
      if (!currentSceneId) { historyList.innerHTML = ''; return; }
      try {
        const res = await fetch(`${SCENE_HISTORY_URL}?sceneId=${encodeURIComponent(currentSceneId)}`);
        renderHistory(res.ok ? await res.json() : []);
      } catch {
        historyList.innerHTML = '<div class="history-empty">Serveur de données de scènes injoignable</div>';
      }
    }

    /** @param {{ timestamp: number, sceneConfig: * }[]} history */
    function renderHistory(history) {
      historyList.innerHTML = '';
      if (history.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'history-empty';
        empty.textContent = 'Aucun historique pour cette scène';
        historyList.appendChild(empty);
        return;
      }

      const originTimestamp = history[0].timestamp;
      [...history].reverse().forEach((entry) => {
        const row = document.createElement('div');
        row.className = 'history-row' + (entry.timestamp === originTimestamp ? ' origin' : '');

        const label = document.createElement('span');
        const isOrigin = entry.timestamp === originTimestamp;
        label.textContent = new Date(entry.timestamp).toLocaleString('fr-FR') + (isOrigin ? ' (origine)' : '');
        row.appendChild(label);

        const restoreBtn = document.createElement('button');
        restoreBtn.className = 'btn btn-small';
        restoreBtn.textContent = 'Restaurer';
        restoreBtn.addEventListener('click', () => restoreVersion(entry.timestamp));
        row.appendChild(restoreBtn);

        historyList.appendChild(row);
      });
    }

    /** @param {number} timestamp */
    async function restoreVersion(timestamp) {
      statusEl.textContent = 'Restauration en cours...';
      try {
        const response = await fetch(SCENE_RESTORE_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sceneId: currentSceneId, timestamp }),
        });
        if (!response.ok) {
          statusEl.textContent = `Échec (${response.status}) : ${await response.text()}`;
          return;
        }
        await loadDynamicScenes(); // recharge SCENE_CONFIGS[currentSceneId] avec la version restaurée
        renderScene();
        statusEl.textContent = 'Version restaurée';
      } catch {
        statusEl.textContent = 'Serveur de dev injoignable — lancer "bun dev/scene-data-server.js"';
      }
    }

    // ─── Archives (2026-07-05) ────────────────────────────────────────────────

    /** Recharge et affiche la liste des scènes supprimées (archivées) — indépendant de la scène courante. */
    async function refreshArchivedScenes() {
      try {
        const res = await fetch(ARCHIVED_SCENES_URL);
        renderArchivedScenes(res.ok ? await res.json() : []);
      } catch {
        archivedList.innerHTML = '<div class="history-empty">Serveur de données de scènes injoignable</div>';
        archivedCount.textContent = '';
      }
    }

    /** @param {string[]} ids */
    function renderArchivedScenes(ids) {
      archivedList.innerHTML = '';
      archivedCount.textContent = ids.length > 0 ? String(ids.length) : '';
      if (ids.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'history-empty';
        empty.textContent = 'Aucune scène archivée';
        archivedList.appendChild(empty);
        return;
      }

      ids.forEach((id) => {
        const row = document.createElement('div');
        row.className = 'history-row';

        const label = document.createElement('span');
        label.textContent = id;
        row.appendChild(label);

        const restoreBtn = document.createElement('button');
        restoreBtn.className = 'btn btn-small';
        restoreBtn.textContent = 'Restaurer';
        restoreBtn.addEventListener('click', () => restoreArchivedScene(id));
        row.appendChild(restoreBtn);

        archivedList.appendChild(row);
      });
    }

    /** @param {string} sceneId */
    async function restoreArchivedScene(sceneId) {
      statusEl.textContent = 'Restauration en cours...';
      try {
        const response = await fetch(RESTORE_ARCHIVED_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sceneId }),
        });
        if (!response.ok) {
          statusEl.textContent = `Échec (${response.status}) : ${await response.text()}`;
          return;
        }
        await loadDynamicScenes(); // fusionne la scène restaurée dans SCENE_CONFIGS
        refreshSceneOptions(sceneId);
        renderScene();
        refreshArchivedScenes();
        statusEl.textContent = `Scène restaurée : ${sceneId}`;
      } catch {
        statusEl.textContent = 'Serveur de dev injoignable — lancer "bun dev/scene-data-server.js"';
      }
    }

    // ─── Contrôle OBS (S6 session 3, 2026-07-06) ───────────────────────────────
    // Best-effort partout : le relais peut ne pas tourner en dev pur (pas d'OBS ouvert), ou
    // RELAY_TOKEN peut être absent (obs-config.local.js non créé) — jamais un échec bruyant,
    // même contrat que refreshObsSource() dans dev/dotgrid-tuner.html.

    /** @returns {{ Authorization: string }} */
    function obsAuthHeaders() {
      return { Authorization: `Bearer ${RELAY_TOKEN}` };
    }

    /** Recharge la liste des scènes OBS + les scene items de la scène sélectionnée. */
    async function refreshObsScenes() {
      if (!RELAY_TOKEN) {
        obsStatusEl.textContent = 'Token OBS non configuré (obs-config.local.js manquant)';
        return;
      }
      try {
        const res = await fetch(OBS_LIST_SCENES_URL, { headers: obsAuthHeaders() });
        if (!res.ok) {
          obsStatusEl.textContent = `Relais OBS indisponible (${res.status})`;
          obsSceneSelect.innerHTML = '';
          obsSceneItemsEl.innerHTML = '';
          return;
        }
        const { scenes, currentProgramSceneName } = await res.json();
        obsStatusEl.textContent = '';
        renderObsScenes(scenes ?? [], currentProgramSceneName);
        if (obsSceneSelect.value) await refreshObsSceneItems(obsSceneSelect.value);
      } catch {
        obsStatusEl.textContent = 'Relais injoignable — lancer "bun relay/server.js"';
        obsSceneSelect.innerHTML = '';
        obsSceneItemsEl.innerHTML = '';
      }
    }

    /**
     * @param {{ sceneName: string }[]} scenes
     * @param {string} [currentProgramSceneName]
     */
    function renderObsScenes(scenes, currentProgramSceneName) {
      const previousValue = obsSceneSelect.value;
      obsSceneSelect.innerHTML = '';
      scenes.forEach(({ sceneName }) => {
        const option = document.createElement('option');
        option.value = sceneName;
        option.textContent = sceneName === currentProgramSceneName ? `${sceneName} (active)` : sceneName;
        obsSceneSelect.appendChild(option);
      });
      const stillExists = scenes.some((s) => s.sceneName === previousValue);
      obsSceneSelect.value = stillExists ? previousValue : (currentProgramSceneName ?? scenes[0]?.sceneName ?? '');
    }

    async function activateObsScene() {
      const sceneName = obsSceneSelect.value;
      if (!sceneName) return;
      try {
        const res = await fetch(OBS_SET_CURRENT_SCENE_URL, {
          method: 'POST',
          headers: { ...obsAuthHeaders(), 'Content-Type': 'application/json' },
          body: JSON.stringify({ sceneName }),
        });
        obsStatusEl.textContent = res.ok ? `Scène OBS activée : ${sceneName}` : `Échec (${res.status})`;
        if (res.ok) refreshObsScenes();
      } catch {
        obsStatusEl.textContent = 'Relais injoignable';
      }
    }

    async function createObsScene() {
      const input = document.getElementById('obs-new-scene-name');
      const sceneName = input.value.trim();
      if (!sceneName) return;
      try {
        const res = await fetch(OBS_CREATE_SCENE_URL, {
          method: 'POST',
          headers: { ...obsAuthHeaders(), 'Content-Type': 'application/json' },
          body: JSON.stringify({ sceneName }),
        });
        obsStatusEl.textContent = res.ok ? `Scène OBS créée : ${sceneName}` : `Échec (${res.status}) : ${await res.text()}`;
        if (res.ok) { input.value = ''; await refreshObsScenes(); obsSceneSelect.value = sceneName; }
      } catch {
        obsStatusEl.textContent = 'Relais injoignable';
      }
    }

    /** @param {string} sceneName */
    async function refreshObsSceneItems(sceneName) {
      try {
        const res = await fetch(`${OBS_LIST_SCENE_ITEMS_URL}?sceneName=${encodeURIComponent(sceneName)}`, { headers: obsAuthHeaders() });
        if (!res.ok) { obsSceneItemsEl.innerHTML = ''; return; }
        const { sceneItems } = await res.json();
        renderObsSceneItems(sceneName, sceneItems ?? []);
      } catch {
        obsSceneItemsEl.innerHTML = '';
      }
    }

    /**
     * @param {string} sceneName
     * @param {{ sceneItemId: number, sourceName: string, sceneItemEnabled?: boolean }[]} items
     */
    function renderObsSceneItems(sceneName, items) {
      obsSceneItemsEl.innerHTML = '';

        const empty = document.createElement('div');
        empty.className = 'history-empty';
        empty.textContent = 'Aucune source dans cette scène';
        obsSceneItemsEl.appendChild(empty);
        return;
      }

      items.forEach((item) => {
        const row = document.createElement('div');
        row.className = 'history-row';

        const label = document.createElement('span');
        label.textContent = item.sourceName;
        row.appendChild(label);

        const posX = document.createElement('input');
        posX.type = 'number';
        posX.placeholder = 'x';
        posX.style.width = '60px';
        const posY = document.createElement('input');
        posY.type = 'number';
        posY.placeholder = 'y';
        posY.style.width = '60px';
        row.appendChild(posX);
        row.appendChild(posY);

        const applyBtn = document.createElement('button');
        applyBtn.className = 'btn btn-small';
        applyBtn.textContent = 'Positionner';
        applyBtn.addEventListener('click', () => setObsSceneItemPosition(sceneName, item.sceneItemId, posX.value, posY.value));
        row.appendChild(applyBtn);

        const toggleBtn = document.createElement('button');
        toggleBtn.className = 'btn btn-small';
        toggleBtn.textContent = item.sceneItemEnabled === false ? 'Afficher' : 'Masquer';
        toggleBtn.addEventListener('click', () => toggleObsSceneItemEnabled(sceneName, item.sceneItemId, item.sceneItemEnabled === false));
        row.appendChild(toggleBtn);

        obsSceneItemsEl.appendChild(row);
      });
    }

    /**
     * @param {string} sceneName
     * @param {number} sceneItemId
     * @param {string} x
     * @param {string} y
     */
    async function setObsSceneItemPosition(sceneName, sceneItemId, x, y) {
      if (x === '' || y === '') return;
      try {
        const res = await fetch(OBS_SET_SCENE_ITEM_TRANSFORM_URL, {
          method: 'POST',
          headers: { ...obsAuthHeaders(), 'Content-Type': 'application/json' },
          body: JSON.stringify({ sceneName, sceneItemId, sceneItemTransform: { positionX: Number(x), positionY: Number(y) } }),
        });
        obsStatusEl.textContent = res.ok ? 'Source positionnée' : `Échec (${res.status})`;
      } catch {
        obsStatusEl.textContent = 'Relais injoignable';
      }
    }

    /**
     * @param {string} sceneName
     * @param {number} sceneItemId
     * @param {boolean} nextEnabled
     */
    async function toggleObsSceneItemEnabled(sceneName, sceneItemId, nextEnabled) {
      try {
        const res = await fetch(OBS_SET_SCENE_ITEM_ENABLED_URL, {
          method: 'POST',
          headers: { ...obsAuthHeaders(), 'Content-Type': 'application/json' },
          body: JSON.stringify({ sceneName, sceneItemId, sceneItemEnabled: nextEnabled }),
        });
        if (res.ok) refreshObsSceneItems(sceneName);
        else obsStatusEl.textContent = `Échec (${res.status})`;

    async function createObsSceneItem() {
      const sceneName = obsSceneSelect.value;
      const input = document.getElementById('obs-new-source-name');

    document.getElementById('obs-activate-btn').addEventListener('click', activateObsScene);
    document.getElementById('obs-create-scene-btn').addEventListener('click', createObsScene);

    obsSceneSelect.addEventListener('change', () => refreshObsSceneItems(obsSceneSelect.value));

    function applyPlacementStyle(el, placement) {
      el.style.position = 'absolute';
      el.style.left = `${placement.x}px`;
      el.style.top = `${placement.y}px`;
      if (placement.width !== undefined) el.style.width = `${placement.width}px`;
      if (placement.height !== undefined) el.style.height = `${placement.height}px`;
    }

    function makeDraggable(el, layerName) {
      el.classList.add('placement-handle');
      applyPlacementStyle(el, livePlacements[layerName]);

      const label = document.createElement('span');
      label.className = 'placement-handle-label';
      label.textContent = layerName;
      el.appendChild(label);

      let dragging = false;
      let startMouseX = 0, startMouseY = 0, startX = 0, startY = 0;

      el.addEventListener('mousedown', (e) => {
        dragging = true;
        el.classList.add('dragging');
        const scale = Number(surface.dataset.scale) || 1;
        startMouseX = e.clientX / scale;
        startMouseY = e.clientY / scale;
        startX = livePlacements[layerName].x;
        startY = livePlacements[layerName].y;
        e.preventDefault();
      });

      window.addEventListener('mousemove', (e) => {
        if (!dragging) return;
        const scale = Number(surface.dataset.scale) || 1;
        const mouseX = e.clientX / scale;
        const mouseY = e.clientY / scale;
        const newX = Math.round(startX + (mouseX - startMouseX));
        const newY = Math.round(startY + (mouseY - startMouseY));
        livePlacements[layerName] = { ...livePlacements[layerName], x: newX, y: newY };
        applyPlacementStyle(el, livePlacements[layerName]);
        updateLayerRow(layerName);
      });

      window.addEventListener('mouseup', () => {
        if (!dragging) return;
        dragging = false;
        el.classList.remove('dragging');
      });
    }

    /**
     * Rend un composant individuel déplaçable (2026-07-05) — seulement s'il a déjà un `placement`
     * (même règle que les couches, S7 V1 : pas d'insertion via le drag, voir bouton "Positionner"
     * pour en assigner un). Sauvegarde automatique au relâchement — pas de bouton "Sauvegarder"
     * séparé, cohérent avec le reste du panneau (composition, couches) depuis l'historique.
     * @param {HTMLElement} el
     * @param {string} layerName
     * @param {number} index
     */
    function makeComponentDraggable(el, layerName, index) {
      const key = `${layerName}::${index}`;
      el.classList.add('placement-handle', 'component-handle');

      const label = document.createElement('span');
      label.className = 'placement-handle-label component-handle-label';
      const mount = liveConfig.layers.find((l) => l.name === layerName)?.components[index];
      label.textContent = mount?.component ?? '?';
      el.appendChild(label);

      let dragging = false;
      let startMouseX = 0, startMouseY = 0, startX = 0, startY = 0;

      el.addEventListener('mousedown', (e) => {
        dragging = true;
        el.classList.add('dragging');
        const scale = Number(surface.dataset.scale) || 1;
        startMouseX = e.clientX / scale;
        startMouseY = e.clientY / scale;
        startX = liveComponentPlacements[key].x;
        startY = liveComponentPlacements[key].y;
        e.preventDefault();
        e.stopPropagation(); // ne pas aussi déclencher le drag de la couche parente
      });

      window.addEventListener('mousemove', (e) => {
        if (!dragging) return;
        const scale = Number(surface.dataset.scale) || 1;
        const mouseX = e.clientX / scale;
        const mouseY = e.clientY / scale;
        const newX = Math.round(startX + (mouseX - startMouseX));
        const newY = Math.round(startY + (mouseY - startMouseY));
        liveComponentPlacements[key] = { ...liveComponentPlacements[key], x: newX, y: newY };
        applyPlacementStyle(el, liveComponentPlacements[key]);
      });

      window.addEventListener('mouseup', () => {
        if (!dragging) return;
        dragging = false;
        el.classList.remove('dragging');

        const layer = liveConfig.layers.find((l) => l.name === layerName);
        const droppedMount = layer?.components[index];
        if (droppedMount) {
          droppedMount.placement = { ...liveComponentPlacements[key] };
          saveSceneConfig(`déplacement ${droppedMount.component} (${layerName})`);
        }
      });
    }

    function updateLayerRow(layerName) {
      const coordsEl = document.getElementById(`coords-${layerName}`);
      if (coordsEl) {
        const p = livePlacements[layerName];
        coordsEl.textContent = `x:${p.x} y:${p.y}` + (p.width !== undefined ? ` w:${p.width} h:${p.height}` : '');
      }
    }

    /** Index en cours de glisser-déposer (gestion des couches, 2026-07-05) — null hors drag. */
    let draggedLayerIndex = null;

    function renderLayerList(config) {
      layerList.innerHTML = '';
      config.layers.forEach((layer, index) => {
        const row = document.createElement('div');
        row.className = 'layer-row' + (layer.placement ? '' : ' unmigrated');

        // Glisser-déposer pour réordonner — poignée dédiée (pas toute la ligne) pour ne pas gêner
        // les clics/saisies dans les champs de la ligne (owner, 2026-07-05).
        row.addEventListener('dragover', (e) => { e.preventDefault(); row.classList.add('drag-over-row'); });
        row.addEventListener('dragleave', () => row.classList.remove('drag-over-row'));
        row.addEventListener('drop', (e) => {
          e.preventDefault();
          row.classList.remove('drag-over-row');
          if (draggedLayerIndex === null || draggedLayerIndex === index) return;
          const [moved] = liveConfig.layers.splice(draggedLayerIndex, 1);
          liveConfig.layers.splice(index, 0, moved);
          draggedLayerIndex = null;
          saveSceneConfig('réordonnancement des couches (glisser-déposer)');
          renderScene(); // l'ordre de montage change l'empilement visuel — doit se refléter dans la preview
        });

        const head = document.createElement('div');
        head.className = 'row-head';

        const nameGroup = document.createElement('div');
        nameGroup.className = 'layer-name-group';

        const handle = document.createElement('span');
        handle.className = 'drag-handle';
        handle.textContent = '⠿';
        handle.title = 'Glisser pour réordonner';
        handle.draggable = true;
        handle.addEventListener('dragstart', (e) => {
          draggedLayerIndex = index;
          row.classList.add('dragging-row');
          e.dataTransfer?.setData('text/plain', layer.name); // requis par Firefox pour autoriser le drag
        });
        handle.addEventListener('dragend', () => {
          row.classList.remove('dragging-row');
          draggedLayerIndex = null;
        });
        nameGroup.appendChild(handle);

        // Renommage (2026-07-05) — jamais goldbar, invariant V4 (exactement une couche "goldbar").
        if (layer.name === 'goldbar') {
          const name = document.createElement('span');
          name.className = 'layer-name';
          name.textContent = layer.name;
          name.title = 'La couche goldbar ne peut pas être renommée';
          nameGroup.appendChild(name);
        } else {
          const nameInput = document.createElement('input');
          nameInput.type = 'text';
          nameInput.className = 'layer-name-input';
          nameInput.value = layer.name;
          nameInput.addEventListener('change', () => renameLayer(layer.name, nameInput.value));
          nameGroup.appendChild(nameInput);
        }

        const tag = document.createElement('span');
        tag.className = 'layer-tag ' + (layer.placement ? 'draggable' : 'fixed');
        tag.textContent = layer.placement ? 'déplaçable' : 'CSS fixe';
        tag.title = layer.placement
          ? 'Position/taille modifiables par glisser-déposer'
          : 'Position fixée par le CSS de la scène — non déplaçable (couche composite ou jamais migrée, voir docs/inbox.md)';
        nameGroup.appendChild(tag);
        head.appendChild(nameGroup);

        const actions = document.createElement('div');
        actions.className = 'layer-order-actions';

        const upBtn = document.createElement('button');
        upBtn.className = 'btn btn-ghost btn-small';
        upBtn.textContent = '↑';
        upBtn.title = 'Monter cette couche';
        upBtn.disabled = index === 0;
        upBtn.addEventListener('click', () => moveLayer(index, -1));
        actions.appendChild(upBtn);

        const downBtn = document.createElement('button');
        downBtn.className = 'btn btn-ghost btn-small';
        downBtn.textContent = '↓';
        downBtn.title = 'Descendre cette couche';
        downBtn.disabled = index === config.layers.length - 1;
        downBtn.addEventListener('click', () => moveLayer(index, 1));
        actions.appendChild(downBtn);

        // Retrait de couche entière (S8 session 6/6) — jamais goldbar, invariant V4 (AC-36).
        const removeLayerBtn = document.createElement('button');
        removeLayerBtn.className = 'btn btn-danger btn-small';
        removeLayerBtn.textContent = '✕';
        removeLayerBtn.title = 'Supprimer cette couche';
        if (layer.name === 'goldbar') {
          removeLayerBtn.disabled = true;
          removeLayerBtn.title = 'La couche goldbar ne peut pas être supprimée';
        } else {
          removeLayerBtn.addEventListener('click', () => removeLayer(layer.name));
        }
        actions.appendChild(removeLayerBtn);

        head.appendChild(actions);
        row.appendChild(head);

        if (layer.placement) {
          const coords = document.createElement('span');
          coords.className = 'layer-coords';
          coords.id = `coords-${layer.name}`;
          const p = livePlacements[layer.name];
          coords.textContent = `x:${p.x} y:${p.y}` + (p.width !== undefined ? ` w:${p.width} h:${p.height}` : '');
          row.appendChild(coords);

          const btnRow = document.createElement('div');
          btnRow.className = 'layer-placement-actions';

          const saveBtn = document.createElement('button');
          saveBtn.className = 'btn';
          saveBtn.textContent = 'Sauvegarder';
          saveBtn.addEventListener('click', () => saveLayerPlacement(layer.name));
          btnRow.appendChild(saveBtn);

          const resetBtn = document.createElement('button');
          resetBtn.className = 'btn btn-ghost';
          resetBtn.textContent = 'Réinitialiser';
          resetBtn.addEventListener('click', () => resetLayerPlacement(layer.name));
          btnRow.appendChild(resetBtn);

          row.appendChild(btnRow);
        }

        row.appendChild(renderComponentsSection(layer));

        layerList.appendChild(row);
      });
    }

    function resetLayerPlacement(layerName) {
      livePlacements[layerName] = { ...originalPlacements[layerName] };
      const wrapper = surface.querySelector('.scene');
      const el = wrapper?.querySelector(`[data-layer="${layerName}"]`);
      if (el instanceof HTMLElement) applyPlacementStyle(el, livePlacements[layerName]);
      updateLayerRow(layerName);
      statusEl.textContent = `Réinitialisé : ${layerName} (valeur au chargement de la scène, pas encore sauvegardée)`;
    }

    function resetAllPlacements() {
      Object.keys(originalPlacements).forEach(resetLayerPlacement);
    }

    async function saveLayerPlacement(layerName) {
      statusEl.textContent = 'Sauvegarde en cours...';
      try {
        const response = await fetch(PLACEMENT_SERVER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sceneId: currentSceneId, layerName, placement: livePlacements[layerName] }),
        });
        if (response.ok) {
          // Synchronise liveConfig avec la valeur sauvegardée — évite qu'une sauvegarde de
          // composition ultérieure (POST /update-scene, config complète) n'écrase ce placement
          // avec la valeur périmée du chargement de la scène (S8 session 5/6, review).
          const layer = liveConfig.layers.find((l) => l.name === layerName);
          if (layer) layer.placement = { ...livePlacements[layerName] };
          statusEl.textContent = `Sauvegardé : ${currentSceneId}.scene.json — ${layerName}`;
          refreshHistory(); // /save-placement ajoute une entrée d'historique (scene-data-server.js)
        } else {
          statusEl.textContent = `Échec (${response.status})`;
        }
      } catch {
        statusEl.textContent = 'Serveur de dev injoignable — lancer "bun dev/placement-server.js"';
      }
    }

    // ─── Composition (S8 session 5/6) ────────────────────────────────────────

    /** @param {unknown} value @returns {value is { $bind: string }} */
    function isBoundValue(value) {
      return typeof value === 'object' && value !== null && typeof value.$bind === 'string';
    }

    async function saveSceneConfig(label) {
      statusEl.textContent = 'Sauvegarde en cours...';
      try {
        const response = await fetch(SCENE_DATA_SERVER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sceneId: currentSceneId, sceneConfig: liveConfig }),
        });
        statusEl.textContent = response.ok
          ? `Sauvegardé : ${label}`
          : `Échec (${response.status})`;
        if (response.ok) refreshHistory(); // chaque sauvegarde ajoute une entrée (scene-data-server.js)
      } catch {
        statusEl.textContent = 'Serveur de dev injoignable — lancer "bun dev/scene-data-server.js"';
      }
    }

    /**
     * Construit l'élément d'entrée adapté à `field.type` (select/token/textarea/number/text) —
     * factorisé du bloc composant de couche (S8) et de la section Fond (Track B B7) pour éviter de
     * dupliquer les 5 branches de type à deux endroits.
     * @param {import('./component-field-schemas.js').FieldSchema} field
     * @param {unknown} currentValue
     * @param {(value: unknown) => void} onChange
     * @returns {HTMLElement}
     */
    function buildFieldInput(field, currentValue, onChange) {
      if (field.type === 'select') {
        const select = document.createElement('select');
        field.choices.forEach((choice) => {
          const opt = document.createElement('option');
          opt.value = choice;
          opt.textContent = choice;
          select.appendChild(opt);
        });
        select.value = String(currentValue);
        select.addEventListener('change', () => onChange(select.value));
        return select;
      }
      if (field.type === 'token') {
        // Menu déroulant des tokens tokens.css connus + "Personnalisé..." en secours — évite de
        // devoir taper var(--...) de mémoire (owner, 2026-07-05).
        const tokens = DESIGN_TOKENS[field.tokenCategory] ?? [];
        const isKnownToken = tokens.includes(String(currentValue));

        const wrapper = document.createElement('div');
        wrapper.style.cssText = 'flex:1; display:flex; flex-direction:column; gap:4px;';

        const select = document.createElement('select');
        tokens.forEach((token) => {
          const opt = document.createElement('option');
          opt.value = token;
          opt.textContent = tokenLabel(token);
          select.appendChild(opt);
        });
        const customOpt = document.createElement('option');
        customOpt.value = '__custom__';
        customOpt.textContent = 'Personnalisé...';
        select.appendChild(customOpt);
        select.value = isKnownToken ? String(currentValue) : '__custom__';

        const customInput = document.createElement('input');
        customInput.type = 'text';
        customInput.placeholder = 'valeur CSS personnalisée';
        customInput.value = isKnownToken ? '' : String(currentValue ?? '');
        customInput.style.display = isKnownToken ? 'none' : 'block';

        select.addEventListener('change', () => {
          if (select.value === '__custom__') {
            customInput.style.display = 'block';
            customInput.focus();
          } else {
            customInput.style.display = 'none';
            onChange(select.value);
          }
        });
        customInput.addEventListener('change', () => onChange(customInput.value));

        wrapper.appendChild(select);
        wrapper.appendChild(customInput);
        return wrapper;
      }
      if (field.type === 'textarea') {
        const textarea = document.createElement('textarea');
        textarea.value = Array.isArray(currentValue) ? currentValue.join('\n') : '';
        textarea.addEventListener('change', () => onChange(textarea.value.split('\n')));
        return textarea;
      }
      if (field.type === 'number') {
        const input = document.createElement('input');
        input.type = 'number';
        input.step = 'any';
        input.value = String(currentValue);
        input.addEventListener('change', () => onChange(Number(input.value)));
        return input;
      }
      const input = document.createElement('input');
      input.type = 'text';
      input.value = String(currentValue ?? '');
      input.addEventListener('change', () => onChange(input.value));
      return input;
    }

    /** Construit le formulaire d'un ComponentMount — se reconstruit lui-même sur bascule $bind. */
    function buildComponentBlock(layer, mountIndex) {
      const mount = layer.components[mountIndex];
      const block = document.createElement('div');
      block.className = 'component-block';

      const head = document.createElement('div');
      head.className = 'component-head';
      const title = document.createElement('span');
      title.className = 'component-type';
      title.textContent = mount.component;
      head.appendChild(title);

      // Placement individuel (2026-07-05) : sans placement, un composant suit le flux DOM normal
      // (pas déplaçable dans la preview) — "Positionner" lui assigne un rectangle de départ
      // générique (redimensionnement non supporté, même limite que le placement de couche, S7 V1).
      const placementBtn = document.createElement('button');
      placementBtn.className = 'btn btn-ghost btn-small';
      if (mount.placement) {
        placementBtn.textContent = 'Retirer le placement';
        placementBtn.title = 'Repasse ce composant en flux DOM naturel (plus déplaçable individuellement)';
        placementBtn.addEventListener('click', () => {
          delete mount.placement;
          saveSceneConfig(`retrait placement ${mount.component} (${layer.name})`);
          renderScene();
        });
      } else {
        placementBtn.textContent = 'Positionner';
        placementBtn.title = 'Assigne un placement individuel — devient déplaçable dans la preview';
        placementBtn.addEventListener('click', () => {
          mount.placement = { x: 100, y: 100, width: 300, height: 100 };
          saveSceneConfig(`positionnement ${mount.component} (${layer.name})`);
          renderScene();
        });
      }
      head.appendChild(placementBtn);

      const removeBtn = document.createElement('button');
      removeBtn.className = 'btn btn-danger btn-small';
      removeBtn.textContent = 'Retirer';
      // Pas de confirmation : l'historique est le filet de sécurité (2026-07-05).
      removeBtn.addEventListener('click', () => {
        layer.components.splice(mountIndex, 1);
        saveSceneConfig(`retrait ${mount.component} (${layer.name})`);
        renderScene(); // le composant retiré doit disparaître de la preview
      });
      head.appendChild(removeBtn);
      block.appendChild(head);

      const schema = COMPONENT_FIELD_SCHEMAS[mount.component] ?? [];
      schema.forEach((field) => {
        const row = document.createElement('div');
        row.className = 'field-row';

        const labelEl = document.createElement('label');
        labelEl.textContent = field.label;
        row.appendChild(labelEl);

        const currentValue = mount.options[field.key] ?? field.default;
        const bound = isBoundValue(currentValue);

        // Sauvegarde automatique (perte de focus/validation pour les champs, immédiate pour la
        // bascule $bind) — plus de bouton "Enregistrer" (2026-07-05, scene-history-protocol.md).
        const save = () => saveSceneConfig(`${mount.component} (${layer.name})`);

        const toggle = document.createElement('button');
        toggle.type = 'button';
        toggle.className = 'bind-toggle';
        toggle.textContent = bound ? 'lié' : 'fixe';
        toggle.title = "Basculer valeur fixe / liée à l'état";
        toggle.addEventListener('click', () => {
          mount.options[field.key] = isBoundValue(mount.options[field.key])
            ? field.default
            : { $bind: '' };
          const fresh = buildComponentBlock(layer, mountIndex);
          block.replaceWith(fresh);
          save();
        });
        row.appendChild(toggle);

        if (bound) {
          const input = document.createElement('input');
          input.type = 'text';
          input.placeholder = "chemin d'état (ex: subjectLine)";
          input.value = /** @type {{$bind: string}} */ (currentValue).$bind ?? '';
          input.addEventListener('change', () => { mount.options[field.key] = { $bind: input.value }; save(); });
          row.appendChild(input);
        } else {
          row.appendChild(buildFieldInput(field, currentValue, (value) => { mount.options[field.key] = value; save(); }));
        }

        block.appendChild(row);
      });

      return block;
    }

    function renderComponentsSection(layer) {
      const section = document.createElement('div');
      section.className = 'components-section';

      layer.components.forEach((_mount, index) => {
        section.appendChild(buildComponentBlock(layer, index));
      });

      const addRow = document.createElement('div');
      addRow.className = 'add-component-row';

      const select = document.createElement('select');
      COMPOSABLE_COMPONENT_NAMES.forEach((name) => {
        const opt = document.createElement('option');
        opt.value = name;
        opt.textContent = name;
        select.appendChild(opt);
      });
      addRow.appendChild(select);

      const addBtn = document.createElement('button');
      addBtn.className = 'btn';
      addBtn.textContent = 'Ajouter';
      addBtn.addEventListener('click', () => {
        const componentName = select.value;
        const schema = COMPONENT_FIELD_SCHEMAS[componentName] ?? [];
        /** @type {Record<string, unknown>} */
        const options = {};
        schema.forEach((field) => { options[field.key] = field.default; });
        layer.components.push({ component: componentName, options });
        saveSceneConfig(`ajout ${componentName} (${layer.name})`);
        renderScene(); // le composant ajouté doit apparaître dans la preview
      });
      addRow.appendChild(addBtn);

      section.appendChild(addRow);
      return section;
    }

    await loadIndexHtml();
    renderScene();
    refreshArchivedScenes();
    refreshObsScenes();
    scalePreview();
  </script>
</body>
</html>
