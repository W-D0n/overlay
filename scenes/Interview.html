<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>Overlay — Interview</title>
  <!--
    SCÈNE : Interview / Invité
    LAYOUT : Split symétrique (votre cam / cam invité) · Fiches · Chat discret droite
    OBS    : Browser Source 1920×1080
  -->
  <link rel="stylesheet" href="../tokens.css">
  <style>
    .layout { position:relative; width:1920px; height:1080px; overflow:hidden; }

    .zone-cam {
      position: absolute;
      top: 40px;
      width: 740px;
      height: 820px;
      border-radius: var(--radius-md);
      border: var(--border-panel);
      background: var(--color-bg-panel);
    }
    .zone-cam-left  { left: 40px; }
    .zone-cam-right { left: 820px; }

    /* Filet pointillé central */
    .center-rule {
      position: absolute;
      top: 40px; left: 793px;
      width: 0;
      height: 900px;
      border-left: 0.5px dashed rgba(200,185,122,0.3);
    }

    /* Fiches nom */
    .fiche {
      position: absolute;
      top: 878px;
      height: 100px;
      display: flex;
      align-items: center;
      gap: 24px;
      border: 0.5px solid var(--color-gold);
      border-radius: var(--radius-md);
      background: var(--color-bg-widget);
      padding: 0 24px;
    }
    .fiche-left  { left: 40px;  width: 740px; }
    .fiche-right { left: 820px; width: 740px; }

    .fiche-name {
      font-family: var(--font-serif);
      font-size: 38px;
      font-weight: 700;
      color: var(--color-text-primary);
    }
    .fiche-v { width:1px; height:40px; background:var(--color-rule); flex-shrink:0; }
    .fiche-role {
      font-family: var(--font-mono);
      font-size: 20px;
      color: var(--color-gold);
    }

    /* Sujet */
    .subject-bar {
      position: absolute;
      bottom: 20px; left: 40px;
      width: 1520px;
      height: 60px;
      border: var(--border-rule);
      border-radius: var(--radius-md);
      background: var(--color-bg-widget);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 24px;
    }
    .subject-label { font-family:var(--font-mono); font-size:var(--text-xs); color:var(--color-text-mid); letter-spacing:var(--tracking-label); text-transform:uppercase; flex-shrink:0; }
    .subject-v     { width:1px; height:28px; background:var(--color-rule); flex-shrink:0; }
    .subject-text  { font-family:var(--font-serif); font-size:28px; color:var(--color-text-primary); }

    /* Colonne chat droite */
    .col-chat {
      position: absolute;
      top: 40px; left: 1600px;
      width: 280px; height: 860px;
      display: flex; flex-direction: column; gap: 0;
      border-left: var(--border-rule);
      padding-left: 24px;
    }
    .chat-label { font-family:var(--font-mono); font-size:var(--text-xs); color:var(--color-text-mid); letter-spacing:var(--tracking-label); text-transform:uppercase; margin-bottom:12px; }
    .stats-col  { margin-top:auto; padding-top:16px; border-top:var(--border-rule); display:flex; flex-direction:column; gap:12px; }
  </style>
</head>
<body>
<div class="layout">
  <canvas id="dot-grid" style="position:absolute;inset:0;pointer-events:none;z-index:0;"></canvas>
  <div id="bar-top"></div>
  <div id="bar-bot"></div>

  <div class="zone-cam zone-cam-left"  aria-hidden="true"></div>
  <div class="center-rule"             aria-hidden="true"></div>
  <div class="zone-cam zone-cam-right" aria-hidden="true"></div>

  <div class="fiche fiche-left">
    <span class="fiche-name">D0n</span>
    <div class="fiche-v"></div>
    <span class="fiche-role">Streamer · Développeur</span>
  </div>

  <div class="fiche fiche-right">
    <span class="fiche-name" id="guest-name">Invité</span>
    <div class="fiche-v"></div>
    <span class="fiche-role" id="guest-role">—</span>
  </div>

  <div class="subject-bar">
    <span class="subject-label">Sujet</span>
    <div class="subject-v"></div>
    <span class="subject-text" id="subject-text">—</span>
  </div>

  <div class="col-chat">
    <span class="chat-label">Chat</span>
    <div id="chat-feed" style="flex:1;overflow:hidden;"></div>
    <div class="stats-col">
      <div id="stat-viewers"></div>
      <div id="stat-duration"></div>
    </div>
  </div>
</div>
<script type="module">
  import { onStateChange } from '../store.js';
  import { DotGrid, GoldBar, StatBlock, ChatFeed } from '../components/index.js';

  document.getElementById('dot-grid').replaceWith(DotGrid().el);
  document.getElementById('bar-top').replaceWith(GoldBar({ position:'top' }).el);
  document.getElementById('bar-bot').replaceWith(GoldBar({ position:'bottom' }).el);

  const chat = ChatFeed({ maxMessages:10, fontSize:'18px' });
  document.getElementById('chat-feed').appendChild(chat.el);

  const sv = StatBlock({ label:'VIEWERS', value:'—' });
  const sd = StatBlock({ label:'DURÉE', value:'00:00:00', valueColor:'#C8B97A' });
  document.getElementById('stat-viewers').appendChild(sv.el);
  document.getElementById('stat-duration').appendChild(sd.el);

  onStateChange((s) => {
    sv.update({ value: s.viewers > 0 ? s.viewers.toLocaleString('fr-FR') : '—' });
    sd.update({ value: s.duration });
    chat.update(s.chatMessages);
    const gn = document.getElementById('guest-name');
    const gr = document.getElementById('guest-role');
    const st = document.getElementById('subject-text');
    if (gn) gn.textContent = s.guest?.name || 'Invité';
    if (gr) gr.textContent = s.guest?.role || '—';
    if (st) st.textContent = s.subjectLine || '—';
  });
</script>
</body>
</html>
