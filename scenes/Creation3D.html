<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>Overlay — Création 3D / Dessin</title>
  <!--
    SCÈNE : Création 3D / Dessin tablette
    DEUX VARIANTES gérées via ?mode=A (défaut) ou ?mode=B (avec panneau référence)
      A : Capture logiciel + colonne widgets droite
      B : Capture + panneau référence + widgets réduits
    OBS  : Deux Browser Sources pointant sur cette même page avec ?mode=A et ?mode=B
  -->
  <link rel="stylesheet" href="../tokens.css">
  <style>
    .layout { position:relative; width:1920px; height:1080px; overflow:hidden; }

    /* ── Variante A ─────────────────────────────────────────── */
    .mode-a .zone-capture {
      position:absolute; top:40px; left:40px;
      width:1360px; height:992px;
      border-radius:var(--radius-md); border:var(--border-panel);
      background:var(--color-bg-panel);
    }
    .mode-a .sep { position:absolute; top:40px; left:1434px; width:1px; height:1000px; background:var(--color-rule); }
    .mode-a .col-right { position:absolute; top:40px; left:1468px; width:412px; height:1000px; display:flex; flex-direction:column; }

    /* ── Variante B ─────────────────────────────────────────── */
    .mode-b .zone-capture {
      position:absolute; top:40px; left:40px;
      width:860px; height:992px;
      border-radius:var(--radius-md); border:var(--border-panel);
      background:var(--color-bg-panel);
    }
    .mode-b .zone-ref {
      position:absolute; top:40px; left:934px;
      width:660px; height:992px;
      border-radius:var(--radius-md);
      border:0.5px solid var(--color-gold);
      background:var(--color-bg-widget);
    }
    .mode-b .ref-label {
      position:absolute; top:54px; left:950px;
      font-family:var(--font-mono); font-size:var(--text-xs);
      color:var(--color-gold); letter-spacing:var(--tracking-label);
      text-transform:uppercase;
    }
    .mode-b .sep { position:absolute; top:40px; left:1628px; width:1px; height:1000px; background:var(--color-rule); }
    .mode-b .col-right { position:absolute; top:40px; left:1662px; width:218px; height:1000px; display:flex; flex-direction:column; }

    /* ── Colonne droite commune ──────────────────────────────── */
    .name-block { padding-bottom:14px; border-bottom:var(--border-gold); flex-shrink:0; }
    .name-block h1 { font-family:var(--font-serif); font-size:48px; font-weight:700; color:var(--color-text-primary); letter-spacing:-0.5px; line-height:1; }

    .cam-mini { margin-top:16px; width:120px; height:120px; border-radius:var(--radius-md); border:var(--border-panel); background:var(--color-bg-panel); flex-shrink:0; }

    .section { padding:16px 0; border-bottom:var(--border-rule); flex-shrink:0; }
    .label   { display:block; font-family:var(--font-mono); font-size:var(--text-xs); color:var(--color-text-mid); letter-spacing:var(--tracking-label); text-transform:uppercase; margin-bottom:8px; }

    #tool-name   { font-family:var(--font-mono); font-size:22px; color:var(--color-text-primary); margin-bottom:4px; }
    #tool-detail { font-family:var(--font-mono); font-size:16px; color:var(--color-gold); margin-bottom:4px; }
    #tool-app    { font-family:var(--font-mono); font-size:14px; color:var(--color-text-mid); }

    .footer { margin-top:auto; padding-top:16px; border-top:0.3px solid var(--color-gold-dim); font-family:var(--font-mono); font-size:var(--text-xs); color:var(--color-text-ghost); }
  </style>
</head>
<body>
<div class="layout" id="layout">
  <canvas id="dot-grid" style="position:absolute;inset:0;pointer-events:none;z-index:0;"></canvas>
  <div id="bar-top"></div>
  <div id="bar-bot"></div>

  <div class="zone-capture" aria-hidden="true"></div>
  <div class="zone-ref" aria-hidden="true" id="zone-ref" style="display:none;"></div>
  <div class="ref-label" id="ref-label" style="display:none;">Référence</div>
  <div class="sep" aria-hidden="true"></div>

  <div class="col-right">
    <div class="name-block"><h1>D0n</h1></div>
    <div class="cam-mini" aria-hidden="true"></div>

    <div class="section">
      <span class="label">Outil actif</span>
      <div id="tool-name">—</div>
      <div id="tool-detail"></div>
      <div id="tool-app"></div>
    </div>

    <div class="section">
      <div id="pomodoro-widget"></div>
    </div>

    <div class="section">
      <div id="stat-viewers"></div>
    </div>

    <div class="footer">twitch.tv/d0natelll0</div>
  </div>
</div>
<script type="module">
  import { onStateChange } from '../store.js';
  import { DotGrid, GoldBar, StatBlock, PomodoroBar } from '../components/index.js';

  // Mode A ou B selon paramètre URL
  const mode = new URLSearchParams(location.search).get('mode') || 'A';
  document.getElementById('layout').classList.add(`mode-${mode.toLowerCase()}`);
  if (mode === 'B') {
    document.getElementById('zone-ref').style.display = 'block';
    document.getElementById('ref-label').style.display = 'block';
  }

  document.getElementById('dot-grid').replaceWith(DotGrid().el);
  document.getElementById('bar-top').replaceWith(GoldBar({ position:'top' }).el);
  document.getElementById('bar-bot').replaceWith(GoldBar({ position:'bottom' }).el);

  const pom = PomodoroBar();
  document.getElementById('pomodoro-widget').appendChild(pom.el);

  const sv = StatBlock({ label:'VIEWERS', value:'—' });
  document.getElementById('stat-viewers').appendChild(sv.el);

  onStateChange((s) => {
    sv.update({ value: s.viewers > 0 ? s.viewers.toLocaleString('fr-FR') : '—' });
    pom.update(s.pomodoro);
    const tn = document.getElementById('tool-name');
    const td = document.getElementById('tool-detail');
    const ta = document.getElementById('tool-app');
    if (tn) tn.textContent = s.currentTool    || '—';
    if (td) td.textContent = s.currentFile    || '';
    if (ta) ta.textContent = s.currentActivity || '';
  });
</script>
</body>
</html>
