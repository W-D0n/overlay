<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>Overlay — BRB</title>
  <!--
    SCÈNE : BRB / Pause
    LAYOUT : Plein écran · Bloc message gauche · Chat droite · Prochain stream bas
    NOTE   : Fond animé (dots en vagues) — pas de cam
    OBS    : Browser Source 1920×1080
  -->
  <link rel="stylesheet" href="../tokens.css">
  <style>
    body { background: var(--color-bg-bar); }

    .layout {
      position: relative;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: #080808;
    }

    /* ── Animation dots (vagues radiales via CSS) ────────────── */
    @keyframes pulse-dot {
      0%, 100% { opacity: 0.1;  }
      50%       { opacity: 0.28; }
    }

    /* ── Séparateur vertical central ────────────────────────── */
    .separator {
      position: absolute;
      top: 40px;
      left: 1140px;
      width: 1px;
      height: 940px;
      background: var(--color-rule);
    }

    /* ── Bloc gauche — message ──────────────────────────────── */
    .block-left {
      position: absolute;
      top: 80px;
      left: 80px;
      width: 1020px;
      bottom: 120px;
      display: flex;
      flex-direction: column;
    }

    .brb-tag {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      color: var(--color-text-mid);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    .brb-name {
      font-family: var(--font-serif);
      font-size: 120px;
      font-weight: 700;
      color: var(--color-text-primary);
      letter-spacing: -2px;
      line-height: 0.9;
      margin-bottom: 24px;
    }

    .gold-rule {
      width: 100%;
      height: 0.8px;
      background: var(--color-gold);
      margin-bottom: 32px;
      flex-shrink: 0;
    }

    .brb-message {
      font-family: var(--font-serif);
      font-size: 38px;
      color: var(--color-text-primary);
      line-height: 1.4;
      margin-bottom: 8px;
    }

    .brb-activity {
      font-family: var(--font-serif);
      font-size: 38px;
      color: var(--color-gold);
      line-height: 1.4;
    }

    .brb-divider {
      width: 100%;
      height: 0.5px;
      background: var(--color-rule);
      margin: 32px 0;
      flex-shrink: 0;
    }

    .brb-song-label {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      color: var(--color-text-mid);
      letter-spacing: var(--tracking-label);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .brb-song {
      font-family: var(--font-mono);
      font-size: 22px;
      color: var(--color-gold);
    }

    /* ── Bloc droit — chat ──────────────────────────────────── */
    .block-right {
      position: absolute;
      top: 80px;
      left: 1174px;
      width: 706px;
      bottom: 120px;
      display: flex;
      flex-direction: column;
    }

    .chat-label {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      color: var(--color-text-mid);
      letter-spacing: var(--tracking-label);
      text-transform: uppercase;
      margin-bottom: 16px;
      flex-shrink: 0;
    }

    .chat-rule {
      width: 100%;
      height: 0.5px;
      background: var(--color-rule);
      margin-bottom: 16px;
      flex-shrink: 0;
    }

    #chat-container {
      flex: 1;
      overflow: hidden;
    }

    /* Stats chat bas droit */
    .stats-mini {
      display: flex;
      gap: 40px;
      margin-top: 24px;
      padding-top: 16px;
      border-top: 0.5px solid var(--color-rule);
      flex-shrink: 0;
    }

    /* ── Bande basse — prochain stream ──────────────────────── */
    .next-strip {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 88px;
      background: var(--color-bg-widget);
      border-top: 0.5px solid var(--color-gold);
      border-top-color: rgba(200, 185, 122, 0.5);
      display: flex;
      align-items: center;
      padding: 0 80px;
      gap: 48px;
    }

    .next-label {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      color: var(--color-text-mid);
      letter-spacing: var(--tracking-label);
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .next-rule-v {
      width: 1px;
      height: 40px;
      background: var(--color-rule);
      flex-shrink: 0;
    }

    .next-info {
      font-family: var(--font-serif);
      font-size: 34px;
      color: var(--color-text-primary);
      flex: 1;
    }

    .next-topic {
      font-family: var(--font-serif);
      font-size: 34px;
      color: var(--color-gold);
    }

    .footer-link {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      color: var(--color-text-ghost);
      flex-shrink: 0;
    }
  </style>
</head>
<body>
<div class="layout" id="layout">

  <!-- Fond animé grille de points (canvas) -->
  <canvas id="dot-grid" style="position:absolute;inset:0;pointer-events:none;z-index:0;"></canvas>

  <div id="bar-top"></div>
  <div id="bar-bot"></div>

  <div class="separator" aria-hidden="true"></div>

  <!-- Bloc gauche -->
  <div class="block-left">
    <div class="brb-tag">— Pause —</div>
    <div class="brb-name">D0n</div>
    <div class="gold-rule"></div>
    <div class="brb-message">Retour dans quelques minutes.</div>
    <div class="brb-message">On était en train de travailler</div>
    <div class="brb-activity" id="brb-activity">sur l'atelier.</div>
    <div class="brb-divider"></div>
    <div class="brb-song-label">En ce moment</div>
    <div class="brb-song" id="brb-song">—</div>
  </div>

  <!-- Bloc droit — chat -->
  <div class="block-right">
    <div class="chat-label">Chat</div>
    <div class="chat-rule"></div>
    <div id="chat-container"></div>
    <div class="stats-mini">
      <div id="stat-viewers"></div>
      <div id="stat-duration"></div>
    </div>
  </div>

  <!-- Bande basse -->
  <div class="next-strip">
    <span class="next-label">Prochain stream</span>
    <div class="next-rule-v"></div>
    <span class="next-info" id="next-stream">À venir</span>
    <div class="next-rule-v"></div>
    <span class="next-topic" id="next-topic"></span>
    <span class="footer-link">twitch.tv/d0natelll0</span>
  </div>

</div>

<script type="module">
  import { onStateChange }                        from '../store.js';
  import { GoldBar, StatBlock, ChatFeed }         from '../components/index.js';
  import { DotGridAnimated }                      from '../components/DotGridAnimated.js';

  // ── Fond animé dots (Couches 1 + 2) ───────────────────────
  const grid = DotGridAnimated({ mode: 'brb' });
  document.getElementById('dot-grid').replaceWith(grid.el);

  document.getElementById('bar-top').replaceWith(GoldBar({ position: 'top', opacity: 0.6 }).el);
  document.getElementById('bar-bot').replaceWith(GoldBar({ position: 'bottom' }).el);

  const chat = ChatFeed({ maxMessages: 10, fontSize: '20px' });
  document.getElementById('chat-container').appendChild(chat.el);

  const statViewers  = StatBlock({ label: 'VIEWERS', value: '—' });
  const statDuration = StatBlock({ label: 'DURÉE',   value: '00:00:00', valueColor: '#C8B97A' });
  document.getElementById('stat-viewers').appendChild(statViewers.el);
  document.getElementById('stat-duration').appendChild(statDuration.el);

  // ── Réactivité ─────────────────────────────────────────────
  onStateChange((state) => {
    statViewers.update({ value: state.viewers > 0 ? state.viewers.toLocaleString('fr-FR') : '—' });
    statDuration.update({ value: state.duration });
    chat.update(state.chatMessages);

    const activityEl  = document.getElementById('brb-activity');
    const songEl      = document.getElementById('brb-song');
    const nextEl      = document.getElementById('next-stream');
    const nextTopicEl = document.getElementById('next-topic');

    if (activityEl)  activityEl.textContent  = state.currentActivity ? `sur ${state.currentActivity}.` : 'sur l\'atelier.';
    if (songEl)      songEl.textContent      = state.currentSong || '—';
    if (nextEl)      nextEl.textContent      = state.nextStream      || 'À venir';
    if (nextTopicEl) nextTopicEl.textContent = state.nextStreamTopic || '';
  });
</script>
</body>
</html>
