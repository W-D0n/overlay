<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>Overlay — Fin de stream</title>
  <!--
    SCÈNE : Fin de stream
    LAYOUT : Cam grande gauche · Récap + prochain + stats + liens droite
    NOTE   : Barre dorée basse à pleine opacité — seule scène où c'est le cas
    OBS    : Browser Source 1920×1080
  -->
  <link rel="stylesheet" href="../tokens.css">
  <style>
    .layout { position:relative; width:1920px; height:1080px; overflow:hidden; }

    .zone-cam {
      position:absolute; top:40px; left:40px;
      width:800px; height:992px;
      border-radius:var(--radius-md); border:var(--border-panel);
      background:var(--color-bg-panel);
    }

    .sep { position:absolute; top:40px; left:880px; width:1px; height:1000px; background:var(--color-rule); }

    .col-right {
      position:absolute; top:40px; left:920px;
      width:960px; height:1000px;
      display:flex; flex-direction:column;
    }

    .name-block { padding-bottom:18px; border-bottom:var(--border-gold); flex-shrink:0; }
    .name-block h1 { font-family:var(--font-serif); font-size:80px; font-weight:700; color:var(--color-text-primary); letter-spacing:-1px; line-height:1; }

    .section { padding:22px 0; border-bottom:var(--border-rule); flex-shrink:0; }
    .label   { display:block; font-family:var(--font-mono); font-size:var(--text-xs); color:var(--color-text-mid); letter-spacing:var(--tracking-label); text-transform:uppercase; margin-bottom:14px; }

    /* Récap */
    .recap-line { font-family:var(--font-serif); font-size:32px; color:var(--color-text-primary); line-height:1.5; }
    .recap-line.dim { color:var(--color-text-mid); }

    /* Prochain stream */
    #next-when  { font-family:var(--font-serif); font-size:38px; color:var(--color-text-primary); margin-bottom:6px; }
    #next-topic { font-family:var(--font-serif); font-size:36px; color:var(--color-gold); }

    /* Stats */
    .stats-grid { display:flex; gap:60px; }

    /* Liens */
    .links-list { display:flex; flex-direction:column; gap:8px; }
    .link-item  { font-family:var(--font-mono); font-size:26px; color:var(--color-gold); }
    .link-item.dim { color:var(--color-text-mid); }

    /* Pied */
    .footer { margin-top:auto; padding-top:16px; border-top:0.3px solid var(--color-gold-dim); font-family:var(--font-mono); font-size:var(--text-xs); color:var(--color-text-ghost); }

    /* Barre bas — pleine opacité (seule scène) */
    .bar-bot-full {
      position:absolute; bottom:0; left:0; right:0;
      height:2.5px; background:var(--color-gold); opacity:0.8;
    }
  </style>
</head>
<body>
<div class="layout">
  <canvas id="dot-grid" style="position:absolute;inset:0;pointer-events:none;z-index:0;"></canvas>
  <div id="bar-top"></div>
  <div class="bar-bot-full"></div>

  <div class="zone-cam" aria-hidden="true"></div>
  <div class="sep" aria-hidden="true"></div>

  <div class="col-right">
    <div class="name-block"><h1>D0n</h1></div>

    <div class="section">
      <span class="label">Session — Récap</span>
      <div id="recap-lines"></div>
    </div>

    <div class="section">
      <span class="label">Prochain stream</span>
      <div id="next-when">À venir</div>
      <div id="next-topic"></div>
    </div>

    <div class="section">
      <span class="label">Stats session</span>
      <div class="stats-grid">
        <div id="stat-max-viewers"></div>
        <div id="stat-new-follows"></div>
        <div id="stat-duration"></div>
      </div>
    </div>

    <div class="section">
      <span class="label">Liens</span>
      <div class="links-list" id="links-list"></div>
    </div>

    <div class="footer">Mozaïk · À bientôt</div>
  </div>
</div>
<script type="module">
  import { onStateChange } from '../store.js';
  import { DotGrid, GoldBar, StatBlock } from '../components/index.js';

  document.getElementById('dot-grid').replaceWith(DotGrid().el);
  document.getElementById('bar-top').replaceWith(GoldBar({ position:'top' }).el);

  const smv = StatBlock({ label:'VIEWERS MAX',     value:'—' });
  const snf = StatBlock({ label:'NOUVEAUX FOLLOWS', value:'—', valueColor:'#C8B97A' });
  const sd  = StatBlock({ label:'DURÉE',            value:'00:00:00' });
  document.getElementById('stat-max-viewers').appendChild(smv.el);
  document.getElementById('stat-new-follows').appendChild(snf.el);
  document.getElementById('stat-duration').appendChild(sd.el);

  onStateChange((s) => {
    smv.update({ value: s.sessionStats.maxViewers > 0 ? s.sessionStats.maxViewers.toLocaleString('fr-FR') : '—' });
    snf.update({ value: s.sessionStats.newFollows  > 0 ? `+${s.sessionStats.newFollows}` : '—' });
    sd.update({  value: s.sessionStats.duration || '00:00:00' });

    const nw = document.getElementById('next-when');
    const nt = document.getElementById('next-topic');
    if (nw) nw.textContent = s.nextStream      || 'À venir';
    if (nt) nt.textContent = s.nextStreamTopic || '';

    // Récap
    const recapEl = document.getElementById('recap-lines');
    if (recapEl && s.recapLines.length > 0) {
      recapEl.innerHTML = '';
      s.recapLines.forEach((line, i) => {
        const div = document.createElement('div');
        div.className = `recap-line${i > 0 ? ' dim' : ''}`;
        div.textContent = line;
        recapEl.appendChild(div);
      });
    }

    // Liens
    const linksEl = document.getElementById('links-list');
    if (linksEl && s.socialLinks.length > 0) {
      linksEl.innerHTML = '';
      s.socialLinks.forEach((link, i) => {
        const div = document.createElement('div');
        div.className = `link-item${i > 0 ? ' dim' : ''}`;
        div.textContent = link;
        linksEl.appendChild(div);
      });
    }
  });
</script>
</body>
</html>
