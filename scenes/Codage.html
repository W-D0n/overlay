<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>Overlay — Codage</title>
  <!--
    SCÈNE : Session de codage publique
    LAYOUT : IDE dominant (gauche ~74%) · Colonne droite (cam mini + widgets)
    OBS    : Browser Source 1920×1080, pointer events OFF
  -->
  <link rel="stylesheet" href="../tokens.css">
  <style>
    .layout {
      position: relative;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
    }

    /* ── Zone capture IDE ───────────────────────────────────── */
    .zone-capture {
      position: absolute;
      top: 40px;
      left: 40px;
      width: 1360px;   /* ~71% */
      height: 992px;
      border-radius: var(--radius-md);
      border: var(--border-panel);
      background: var(--color-bg-panel);
    }

    /* ── Bande d'alertes basse (sous la capture) ────────────── */
    .alert-strip {
      position: absolute;
      bottom: 20px;
      left: 40px;
      width: 1360px;
      height: 20px;
      display: flex;
      align-items: center;
    }

    .alert-strip span {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      color: var(--color-text-ghost);
      letter-spacing: var(--tracking-label);
    }

    /* ── Séparateur vertical ────────────────────────────────── */
    .separator {
      position: absolute;
      top: 40px;
      left: 1434px;
      width: 1px;
      height: 1000px;
      background: var(--color-rule);
    }

    /* ── Colonne droite ─────────────────────────────────────── */
    .col-right {
      position: absolute;
      top: 40px;
      left: 1468px;
      width: 412px;    /* jusqu'à 1920-40 */
      height: 1000px;
      display: flex;
      flex-direction: column;
    }

    /* ── Nom ────────────────────────────────────────────────── */
    .name-block {
      padding-bottom: 14px;
      border-bottom: var(--border-gold);
      flex-shrink: 0;
    }

    .name-block h1 {
      font-family: var(--font-serif);
      font-size: 54px;
      font-weight: 700;
      color: var(--color-text-primary);
      letter-spacing: -0.5px;
      line-height: 1;
    }

    /* ── Cam mini ───────────────────────────────────────────── */
    .cam-mini {
      margin-top: 16px;
      width: 164px;
      height: 164px;
      border-radius: var(--radius-md);
      border: var(--border-panel);
      background: var(--color-bg-panel);
      flex-shrink: 0;
    }

    /* ── Section générique ──────────────────────────────────── */
    .section {
      padding: 18px 0;
      border-bottom: var(--border-rule);
      flex-shrink: 0;
    }

    .label {
      display: block;
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      color: var(--color-text-mid);
      letter-spacing: var(--tracking-label);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    /* ── Fichier actif ──────────────────────────────────────── */
    #file-name {
      font-family: var(--font-mono);
      font-size: 26px;
      color: var(--color-text-primary);
      margin-bottom: 6px;
      word-break: break-all;
    }

    #git-branch {
      font-family: var(--font-mono);
      font-size: 20px;
      color: var(--color-gold);
      margin-bottom: 4px;
    }

    #stack-info {
      font-family: var(--font-mono);
      font-size: 18px;
      color: var(--color-text-mid);
    }

    /* ── Stats ──────────────────────────────────────────────── */
    .stats-row {
      display: flex;
      gap: 32px;
    }

    /* ── Pied ───────────────────────────────────────────────── */
    .footer {
      margin-top: auto;
      padding-top: 16px;
      border-top: 0.3px solid var(--color-gold-dim);
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      color: var(--color-text-ghost);
    }
  </style>
</head>
<body>
<div class="layout">

  <canvas id="dot-grid" style="position:absolute;inset:0;pointer-events:none;z-index:0;"></canvas>
  <div id="bar-top"></div>
  <div id="bar-bot"></div>

  <!-- Zone capture -->
  <div class="zone-capture" aria-hidden="true"></div>

  <!-- Bande alertes basse -->
  <div class="alert-strip">
    <span id="alert-text"></span>
  </div>

  <!-- Séparateur -->
  <div class="separator" aria-hidden="true"></div>

  <!-- Colonne droite -->
  <div class="col-right">

    <div class="name-block">
      <h1>D0n</h1>
    </div>

    <!-- Cam mini (placeholder OBS) -->
    <div class="cam-mini" aria-hidden="true"></div>

    <!-- Fichier actif -->
    <div class="section">
      <span class="label">Fichier actif</span>
      <div id="file-name">—</div>
      <div id="git-branch"></div>
      <div id="stack-info"></div>
    </div>

    <!-- Pomodoro -->
    <div class="section">
      <div id="pomodoro-widget"></div>
    </div>

    <!-- Stats -->
    <div class="section">
      <div class="stats-row">
        <div id="stat-viewers"></div>
        <div id="stat-duration"></div>
      </div>
    </div>

    <div class="footer">twitch.tv/d0natelll0</div>

  </div>

  <div id="alert-banner"></div>

</div>

<script type="module">
  import { onStateChange }                                        from '../store.js';
  import { DotGrid, GoldBar, StatBlock, PomodoroBar, AlertBanner } from '../components/index.js';

  // ── Composants ─────────────────────────────────────────────
  const grid = DotGrid();
  document.getElementById('dot-grid').replaceWith(grid.el);

  document.getElementById('bar-top').replaceWith(GoldBar({ position: 'top' }).el);
  document.getElementById('bar-bot').replaceWith(GoldBar({ position: 'bottom' }).el);

  const statViewers = StatBlock({ label: 'VIEWERS', value: '—', minWidth: '100px' });
  document.getElementById('stat-viewers').appendChild(statViewers.el);

  const statDuration = StatBlock({ label: 'DURÉE', value: '00:00:00', valueColor: '#C8B97A' });
  document.getElementById('stat-duration').appendChild(statDuration.el);

  const pomodoro = PomodoroBar();
  document.getElementById('pomodoro-widget').appendChild(pomodoro.el);

  const alertBanner = AlertBanner();
  document.getElementById('alert-banner').replaceWith(alertBanner.el);

  // ── Réactivité ─────────────────────────────────────────────
  let lastAlertTs = 0;
  let alertTimeout = null;

  onStateChange((state) => {
    statViewers.update({ value: state.viewers > 0 ? state.viewers.toLocaleString('fr-FR') : '—' });
    statDuration.update({ value: state.duration });
    pomodoro.update(state.pomodoro);

    // Fichier actif
    const fileEl   = document.getElementById('file-name');
    const branchEl = document.getElementById('git-branch');
    const stackEl  = document.getElementById('stack-info');

    if (fileEl)   fileEl.textContent   = state.currentFile   || '—';
    if (branchEl) branchEl.textContent = state.currentBranch ? `${state.currentBranch}` : '';
    if (stackEl)  stackEl.textContent  = state.currentActivity || '';

    // Alertes basse priorité (bande du bas)
    if (state.latestAlert && state.latestAlert.timestamp !== lastAlertTs) {
      lastAlertTs = state.latestAlert.timestamp;
      alertBanner.show(state.latestAlert);

      // Bande basse
      const strip = document.getElementById('alert-text');
      if (strip) {
        const typeLabel = { follow: '+ follow', sub: '+ sub', raid: 'raid', bits: 'bits' };
        strip.textContent = `${typeLabel[state.latestAlert.type] ?? ''} — ${state.latestAlert.username}`;
        if (alertTimeout) clearTimeout(alertTimeout);
        alertTimeout = setTimeout(() => { strip.textContent = ''; }, 6000);
      }
    }
  });
</script>
</body>
</html>
